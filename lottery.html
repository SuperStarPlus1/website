<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגרלת לקוחות – סופרסטאר פלוס</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
:root{--blue:#0076DA;--blue2:#005bab;--blue-light:#e6f3fc;--yellow:#ffcc00;--bg:#f4f7f9;--white:#fff;--text:#1a2a3a;--muted:#6b7c93;--border:#d8e3ec;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',Arial,sans-serif;direction:rtl;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:var(--blue);box-shadow:0 3px 16px rgba(0,0,0,.15);}
.hinner{max-width:620px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;}
.header-logo{height:80px;width:auto;object-fit:contain;}
.hbadge{background:var(--yellow);color:var(--text);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;white-space:nowrap;}
.ystrip{width:100%;background:var(--yellow);text-align:center;padding:7px 16px;font-size:13px;font-weight:700;color:var(--text);}
.main{width:100%;max-width:620px;padding:12px 14px 24px;}
.card{background:var(--white);border-radius:16px;box-shadow:0 4px 24px rgba(0,118,218,.10);border:1px solid var(--border);overflow:hidden;}
.card-head{background:var(--blue-light);border-bottom:2px solid var(--blue);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.card-head i{color:var(--blue);font-size:18px;}
.card-head h2{font-size:15px;font-weight:700;color:var(--text);}
.hcount{font-size:12px;color:var(--muted);margin-right:auto;}
.cbody{padding:12px 16px;}
.upload-zone{border:2px dashed var(--blue);border-radius:12px;padding:1rem 1rem;text-align:center;cursor:pointer;background:var(--blue-light);display:block;margin-bottom:8px;transition:.2s;}
.upload-zone:hover{background:#d0e8f8;}
.upload-zone input{display:none;}
.uico{font-size:32px;color:var(--blue);margin-bottom:8px;display:block;}
.upload-zone p{color:var(--muted);font-size:13px;}
.upload-zone p strong{color:var(--blue);font-size:15px;font-weight:700;display:block;margin-bottom:3px;}
.file-ok{background:#eaf6ee;border-radius:10px;padding:8px 12px;display:none;align-items:center;justify-content:space-between;margin-bottom:8px;border:1px solid #b2dfc0;}
.file-ok .fi{display:flex;align-items:center;gap:10px;}
.file-ok .fi i{font-size:20px;color:#28a745;}
.file-ok strong{font-size:14px;color:var(--text);display:block;}
.file-ok small{font-size:12px;color:var(--muted);}
.file-ok button{font-size:12px;font-family:'Heebo',Arial,sans-serif;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer;color:var(--muted);}
.divider{height:3px;background:linear-gradient(to left,var(--yellow),var(--blue));border-radius:2px;margin:4px 0 10px;}

/* STAGE — wheel on top, machine below */
.stage{position:relative;display:flex;flex-direction:column;align-items:center;gap:0;margin-bottom:14px;}

/* Wheel canvas */
#wheel-canvas{display:block;border-radius:50%;box-shadow:0 4px 24px rgba(0,0,0,0.13);}

/* Machine image area */
.machine-row{position:relative;width:100%;max-width:280px;margin-top:-8px;}
.machine-row img{width:100%;display:block;}
/* cream drip canvas overlaid on machine */
#cream-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* Suspense banner */
.suspense-box{
  min-height:44px;display:flex;align-items:center;justify-content:center;
  background:var(--text);color:#fff;border-radius:12px;
  font-size:13px;font-weight:700;padding:6px 14px;margin-top:6px;
  width:100%;text-align:center;letter-spacing:0.3px;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.suspense-box.show{opacity:1;}

/* WINNER MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.show{display:flex;}
.modal{background:var(--white);border-radius:24px;padding:36px 28px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.3);animation:pop .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.5) translateY(40px);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-ice{font-size:56px;margin-bottom:4px;line-height:1;}
.modal-badge{display:inline-block;background:var(--yellow);color:var(--text);font-size:11px;font-weight:700;border-radius:20px;padding:5px 16px;margin-bottom:16px;}
.modal-name{font-size:38px;font-weight:900;color:var(--blue);line-height:1.1;margin-bottom:20px;word-break:break-word;}
.modal-details{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:14px;}
.modal-row .lbl{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:5px;}
.modal-row .lbl i{color:var(--blue);font-size:12px;}
.modal-row .val{font-weight:700;color:var(--blue);}
.modal-close{width:100%;padding:13px;font-size:15px;font-weight:700;font-family:'Heebo',Arial,sans-serif;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;}
.modal-close:hover{background:var(--blue2);}

.btn-run{width:100%;padding:14px;font-size:17px;font-weight:900;font-family:'Heebo',Arial,sans-serif;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,118,218,.3);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-run:hover:not(:disabled){background:var(--blue2);}
.btn-run:active:not(:disabled){transform:scale(.98);}
.btn-run:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-reset{width:100%;margin-top:10px;padding:10px;font-size:14px;font-family:'Heebo',Arial,sans-serif;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:none;align-items:center;justify-content:center;gap:6px;}
.btn-reset:hover{background:var(--bg);}
footer{margin-top:auto;padding:16px;text-align:center;font-size:11px;color:var(--muted);}
footer span{color:var(--blue);font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/logo.png" alt="לוגו סופרסטאר פלוס" class="header-logo">
    <div class="hbadge">🎰 הגרלת לקוחות</div>
  </div>
</header>
<div class="ystrip">הגרלה שקופה ואקראית לחלוטין — בהצלחה לכולם!</div>

<div class="main">
  <div class="card">
    <div class="card-head">
      <i class="fa-solid fa-file-excel"></i>
      <h2>העלאת רשימת משתתפים</h2>
      <span class="hcount" id="hcount"></span>
    </div>
    <div class="cbody">

      <label class="upload-zone" id="drop-zone">
        <input type="file" id="file-inp" accept=".xlsx,.xls,.csv">
        <i class="fa-solid fa-cloud-arrow-up uico"></i>
        <p><strong>בחר קובץ Excel</strong></p>
        <p>גרור לכאן · .xlsx / .xls / .csv</p>
      </label>

      <div class="file-ok" id="file-ok">
        <div class="fi">
          <i class="fa-solid fa-circle-check"></i>
          <div><strong id="fname"></strong><small id="fcount"></small></div>
        </div>
        <button onclick="clearFile()"><i class="fa-solid fa-rotate-left"></i> החלף</button>
      </div>

      <div class="divider"></div>

      <div class="stage" id="stage">
        <!-- Wheel of fortune -->
        <canvas id="wheel-canvas"></canvas>

        <!-- Machine image with cream overlay -->
        <div class="machine-row" id="machine-row">
          <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/nc701_ninja"
               alt="Ninja NC701" id="machine-img">
          <canvas id="cream-canvas"></canvas>
        </div>

        <!-- Suspense banner -->
        <div class="suspense-box" id="suspense-box"></div>
      </div>

      <button class="btn-run" id="btn-run" disabled onclick="startLottery()">
        <i class="fa-solid fa-shuffle"></i> הגרל!
      </button>
      <button class="btn-reset" id="btn-reset" onclick="resetAll()">
        <i class="fa-solid fa-rotate-right"></i> הגרלה חדשה
      </button>
    </div>
  </div>
</div>
<footer>מערכת הגרלות <span>סופרסטאר פלוס</span> · כל הזכויות שמורות</footer>

<!-- WINNER MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-ice">🍦</div>
    <div class="modal-badge">🏆 הזוכה שלנו בהגרלה הוא/היא</div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-details">
      <div class="modal-row">
        <span class="lbl"><i class="fa-solid fa-calendar-days"></i> קניה מתאריך</span>
        <span class="val" id="modal-date"></span>
      </div>
      <div class="modal-row">
        <span class="lbl"><i class="fa-solid fa-receipt"></i> חשבונית מספר</span>
        <span class="val" id="modal-inv"></span>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">סגור</button>
  </div>
</div>

<script>
/* ─── DATA ─── */
let rows=[], colN=0, colD=1, colI=2, namesArr=[], winnerRow=null, running=false;
function guessCol(h,pats){for(let p of pats){const i=h.findIndex(x=>p.test(String(x)));if(i>=0)return i;}return -1;}
function fmtDate(v){if(!v)return'';if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;}return String(v);}

document.getElementById('file-inp').addEventListener('change',function(){if(this.files[0])loadFile(this.files[0]);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='#c5dff5';});
dz.addEventListener('dragleave',()=>{dz.style.background='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.background='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

function loadFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const hdrs=json[0]||[];
      rows=json.slice(1).filter(r=>r.some(c=>c!==''));
      colN=guessCol(hdrs,[/שם לקוח/i,/שם/i,/לקוח/i,/name/i,/customer/i]);if(colN<0)colN=0;
      colD=guessCol(hdrs,[/תאריך/i,/date/i]);if(colD<0)colD=1;
      colI=guessCol(hdrs,[/חשבונית/i,/invoice/i,/מספר/i,/number/i]);if(colI<0)colI=2;
      namesArr=rows.map(r=>String(r[colN]||'')).filter(Boolean);
      document.getElementById('drop-zone').style.display='none';
      document.getElementById('file-ok').style.display='flex';
      document.getElementById('fname').textContent=file.name;
      document.getElementById('fcount').textContent=namesArr.length+' רשומות';
      document.getElementById('hcount').textContent=namesArr.length+' משתתפים';
      document.getElementById('btn-run').disabled=false;
      initWheel();
    }catch(err){alert('שגיאה בקריאת הקובץ');}
  };
  r.readAsArrayBuffer(file);
}

function clearFile(){
  rows=[];namesArr=[];running=false;
  document.getElementById('drop-zone').style.display='';
  document.getElementById('file-ok').style.display='none';
  document.getElementById('file-inp').value='';
  document.getElementById('hcount').textContent='';
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-reset').style.display='none';
  hideSuspense(); stopAnim(); clearCream();
  drawIdleWheel();
}

/* ─── WHEEL ─── */
const wCanvas = document.getElementById('wheel-canvas');
const wCtx = wCanvas.getContext('2d');
const COLORS=['#0076DA','#ffcc00','#e84c3d','#28a745','#9b59b6','#e67e22','#1abc9c','#e91e63','#00bcd4','#ff5722','#3f51b5','#8bc34a'];

let wW=0, wR=0, wCx=0, wCy=0;
let wheelAngle=0, wheelSpeed=0, animId=null, phase='idle';
let winnerIdx=-1, confetti=[];

function setupWheel(){
  const wrap=document.querySelector('.cbody');
  wW=Math.min(wrap.offsetWidth-36, 340);
  wCanvas.width=wW; wCanvas.height=wW;
  wR=wW*0.42; wCx=wW/2; wCy=wW/2;
}

function initWheel(){
  setupWheel();
  phase='idle'; wheelAngle=0; wheelSpeed=0; confetti=[]; winnerIdx=-1;
  stopAnim(); clearCream();
  drawWheel(wheelAngle);
}

function drawIdleWheel(){
  setupWheel();
  wCtx.clearRect(0,0,wW,wW);
  wCtx.save();
  wCtx.beginPath(); wCtx.arc(wCx,wCy,wR,0,Math.PI*2);
  wCtx.fillStyle='#e8eef2'; wCtx.fill();
  wCtx.strokeStyle='#d0d8e0'; wCtx.lineWidth=3; wCtx.stroke();
  wCtx.fillStyle='var(--muted)';
  wCtx.font=`bold ${wW*0.038}px Heebo,Arial`;
  wCtx.textAlign='center'; wCtx.textBaseline='middle';
  wCtx.fillText('העלה קובץ להתחלה',wCx,wCy);
  wCtx.restore();
  drawPointer();
}

function drawWheel(angle){
  wCtx.clearRect(0,0,wW,wW);
  if(!namesArr.length){drawIdleWheel();return;}
  const n=namesArr.length, sa=(Math.PI*2)/n;

  /* glow */
  const grd=wCtx.createRadialGradient(wCx,wCy,wR*0.9,wCx,wCy,wR*1.05);
  grd.addColorStop(0,'rgba(0,118,218,0)'); grd.addColorStop(1,'rgba(0,118,218,0.15)');
  wCtx.beginPath(); wCtx.arc(wCx,wCy,wR*1.05,0,Math.PI*2);
  wCtx.fillStyle=grd; wCtx.fill();

  for(let i=0;i<n;i++){
    const s=angle+i*sa, e=s+sa;
    const isW=(phase==='done'||phase==='braking')&&i===winnerIdx;
    wCtx.save();
    wCtx.beginPath(); wCtx.moveTo(wCx,wCy); wCtx.arc(wCx,wCy,wR,s,e); wCtx.closePath();
    wCtx.fillStyle=isW?'#ffcc00':COLORS[i%COLORS.length]; wCtx.fill();
    wCtx.strokeStyle='rgba(255,255,255,0.55)'; wCtx.lineWidth=2; wCtx.stroke();
    wCtx.restore();
    /* label */
    wCtx.save();
    const mid=s+sa/2, tr=wR*0.67;
    wCtx.translate(wCx+Math.cos(mid)*tr, wCy+Math.sin(mid)*tr);
    wCtx.rotate(mid+Math.PI/2);
    wCtx.fillStyle=isW?'#1a2a3a':'#fff';
    const fs=Math.max(Math.round(wW*0.028-n*0.35),9);
    wCtx.font=`bold ${fs}px Heebo,Arial`;
    wCtx.textAlign='center'; wCtx.textBaseline='middle';
    const lbl=namesArr[i].length>10?namesArr[i].slice(0,9)+'…':namesArr[i];
    wCtx.fillText(lbl,0,0);
    wCtx.restore();
  }
  /* hub */
  wCtx.save();
  wCtx.beginPath(); wCtx.arc(wCx,wCy,wR*0.13,0,Math.PI*2);
  const hg=wCtx.createRadialGradient(wCx-wR*0.04,wCy-wR*0.04,0,wCx,wCy,wR*0.13);
  hg.addColorStop(0,'#fff'); hg.addColorStop(1,'#ccd8e0');
  wCtx.fillStyle=hg; wCtx.fill();
  wCtx.strokeStyle='#a0b4c0'; wCtx.lineWidth=2; wCtx.stroke();
  wCtx.fillStyle='#0076DA'; wCtx.font=`bold ${Math.round(wR*0.09)}px Arial`;
  wCtx.textAlign='center'; wCtx.textBaseline='middle';
  wCtx.fillText('★',wCx,wCy);
  wCtx.restore();

  drawPointer();
  if(confetti.length>0) drawConfetti();
}

function drawPointer(){
  const pw=wR*0.07, ph=wR*0.14;
  wCtx.save();
  wCtx.beginPath();
  wCtx.moveTo(wCx,wCy-wR+ph); wCtx.lineTo(wCx-pw,wCy-wR-5); wCtx.lineTo(wCx+pw,wCy-wR-5);
  wCtx.closePath();
  wCtx.fillStyle='#e84c3d'; wCtx.fill();
  wCtx.strokeStyle='#fff'; wCtx.lineWidth=2; wCtx.stroke();
  wCtx.restore();
}

/* ─── WHEEL LOOP ─── */
function loop(){
  if(phase==='spinning'){
    wheelAngle+=wheelSpeed;
    drawWheel(wheelAngle);
  } else if(phase==='braking'){
    wheelSpeed*=0.985;
    wheelAngle+=wheelSpeed;
    drawWheel(wheelAngle);
    if(wheelSpeed<0.003){ snapToWinner(); return; }
  } else if(phase==='done'){
    drawWheel(wheelAngle);
    if(confetti.length>0) drawConfetti();
    if(confetti.length===0){animId=null;return;}
  }
  animId=requestAnimationFrame(loop);
}

function snapToWinner(){
  const n=namesArr.length, sa=(Math.PI*2)/n;
  const target=-Math.PI/2-(winnerIdx+0.5)*sa;
  let cur=((wheelAngle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  let tgt=((target%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  let diff=tgt-cur; if(diff<0)diff+=Math.PI*2;
  const start0=wheelAngle, dur=700, t0=performance.now();
  function sf(now){
    const t=Math.min((now-t0)/dur,1), e=1-Math.pow(1-t,3);
    wheelAngle=start0+diff*e; drawWheel(wheelAngle);
    if(t<1){requestAnimationFrame(sf);}
    else{
      phase='done'; spawnConfetti();
      animId=requestAnimationFrame(loop);
      /* trigger cream animation on machine */
      startCream();
      setTimeout(openModal,2200);
    }
  }
  requestAnimationFrame(sf);
}

/* ─── CONFETTI ─── */
function spawnConfetti(){
  confetti=[];
  for(let i=0;i<70;i++){
    confetti.push({
      x:wCx+(Math.random()-0.5)*wR,y:wCy+(Math.random()-0.5)*wR,
      vx:(Math.random()-0.5)*6,vy:-(Math.random()*7+2),
      w:6+Math.random()*8,h:3+Math.random()*5,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      angle:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.2,
      gravity:0.18,life:1
    });
  }
}
function drawConfetti(){
  confetti.forEach(c=>{
    c.x+=c.vx;c.y+=c.vy;c.vy+=c.gravity;c.angle+=c.spin;c.life-=0.011;
    wCtx.save();wCtx.translate(c.x,c.y);wCtx.rotate(c.angle);
    wCtx.globalAlpha=Math.max(0,c.life);wCtx.fillStyle=c.color;
    wCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);wCtx.restore();
  });
  confetti=confetti.filter(c=>c.life>0);
}

/* ─── CREAM ANIMATION ON MACHINE ─── */
const machineImg=document.getElementById('machine-img');
const cCanvas=document.getElementById('cream-canvas');
const cCtx=cCanvas.getContext('2d');
let cW=0,cH=0,creamP=0,creamAnim=null;

/* Nozzle output position (relative to machine image): x=25.5%, y=41% */
const NOZZLE={x:0.258,y:0.412};

function syncCreamCanvas(){
  const r=machineImg.getBoundingClientRect();
  cW=r.width; cH=r.height;
  cCanvas.width=cW; cCanvas.height=cH;
}
machineImg.addEventListener('load',syncCreamCanvas);
if(machineImg.complete&&machineImg.naturalWidth>0) setTimeout(syncCreamCanvas,100);

function clearCream(){
  if(creamAnim){cancelAnimationFrame(creamAnim);creamAnim=null;}
  cCtx.clearRect(0,0,cW,cH);
  creamP=0;
}

function startCream(){
  syncCreamCanvas();
  creamP=0;
  if(creamAnim)cancelAnimationFrame(creamAnim);
  function frame(){
    creamP+=1.6;
    drawCream();
    if(creamP<110) creamAnim=requestAnimationFrame(frame);
  }
  creamAnim=requestAnimationFrame(frame);
}

function drawCream(){
  cCtx.clearRect(0,0,cW,cH);
  const nx=cW*NOZZLE.x, ny=cH*NOZZLE.y;
  const p=creamP;
  cCtx.save();

  /* stream */
  const streamH=Math.min(p*0.38,cH*0.07);
  if(streamH>1){
    cCtx.fillStyle='#FFFDE7';
    cCtx.beginPath();
    cCtx.roundRect(nx-5,ny,10,streamH,[0,0,5,5]);
    cCtx.fill();
  }

  /* growing swirl scoop */
  if(p>16){
    const scy=ny+Math.min(p*0.38,cH*0.07);
    const maxR=cW*0.072;
    const r=Math.min((p-16)/65*maxR,maxR);
    /* scoop */
    cCtx.fillStyle='#FFFDE7';
    cCtx.beginPath(); cCtx.arc(nx,scy,r,Math.PI,0,false); cCtx.fill();
    /* swirls */
    cCtx.strokeStyle='#EDE080'; cCtx.lineWidth=1.4;
    for(let s=0;s<3;s++){cCtx.beginPath();cCtx.arc(nx,scy,r*(0.3+s*0.24),Math.PI*0.12,Math.PI*0.88);cCtx.stroke();}
    /* winner name */
    if(r>maxR*0.55){
      const wname=namesArr[winnerIdx]||'';
      cCtx.fillStyle='#1a2a3a';
      const fs=Math.max(Math.round(r*0.35),8);
      cCtx.font=`bold ${fs}px Heebo,Arial`;
      cCtx.textAlign='center'; cCtx.textBaseline='middle';
      cCtx.fillText(wname.length>7?wname.slice(0,7)+'…':wname, nx, scy-r*0.08);
    }
  }
  cCtx.restore();
}

/* ─── SUSPENSE ─── */
const SUSPENSE=[
  {delay:3500,  msg:'🌀 מי יהיה הזוכה הפעם?'},
  {delay:6500,  msg:'😮 זה יכול להיות כל אחד!'},
  {delay:10000, msg:'🔥 המתח עולה... עוד רגע!'},
  {delay:13500, msg:'💫 הגלגל מחליט...'},
  {delay:16500, msg:'🏆 והזוכה שלנו הוא...!'},
];
let suspenseTimers=[];
function showSuspense(msg){
  const el=document.getElementById('suspense-box');
  el.textContent=msg; el.classList.add('show');
  wCanvas.style.boxShadow='0 0 0 4px #ffcc00';
  setTimeout(()=>{wCanvas.style.boxShadow='';},500);
}
function hideSuspense(){
  const el=document.getElementById('suspense-box');
  el.classList.remove('show'); el.textContent='';
}

/* ─── LOTTERY FLOW ─── */
function startLottery(){
  if(running||!namesArr.length)return;
  running=true;
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> מגריל...';
  document.getElementById('btn-reset').style.display='none';
  hideSuspense(); clearCream();

  const valid=rows.filter(r=>r[colN]);
  winnerRow=valid[Math.floor(Math.random()*valid.length)];
  winnerIdx=namesArr.indexOf(String(winnerRow[colN]||''));
  if(winnerIdx<0)winnerIdx=0;

  phase='spinning'; wheelSpeed=0.28;
  stopAnim();
  animId=requestAnimationFrame(loop);

  suspenseTimers=[];
  SUSPENSE.forEach(s=>{ suspenseTimers.push(setTimeout(()=>showSuspense(s.msg),s.delay)); });
  suspenseTimers.push(setTimeout(()=>{ phase='braking'; hideSuspense(); },18000));
}

function openModal(){
  document.getElementById('modal-name').textContent=String(winnerRow[colN]||'');
  document.getElementById('modal-date').textContent=fmtDate(winnerRow[colD])||'—';
  document.getElementById('modal-inv').textContent=winnerRow[colI]||'—';
  document.getElementById('modal').classList.add('show');
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  document.getElementById('btn-reset').style.display='flex';
  running=false;
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function resetAll(){
  running=false; phase='idle'; wheelSpeed=0; confetti=[];
  suspenseTimers.forEach(t=>clearTimeout(t)); suspenseTimers=[];
  hideSuspense(); closeModal(); clearCream();
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-run').disabled=namesArr.length===0;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  initWheel();
}

function stopAnim(){if(animId){cancelAnimationFrame(animId);animId=null;}}

window.addEventListener('load',()=>{setupWheel();drawIdleWheel();});
window.addEventListener('resize',()=>{if(namesArr.length)initWheel();else drawIdleWheel();});
</script>
