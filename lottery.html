<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגרלת לקוחות – סופרסטאר פלוס</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
:root{--blue:#0076DA;--blue2:#005bab;--blue-light:#e6f3fc;--yellow:#ffcc00;--bg:#f4f7f9;--white:#fff;--text:#1a2a3a;--muted:#6b7c93;--border:#d8e3ec;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',Arial,sans-serif;direction:rtl;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:var(--blue);box-shadow:0 3px 16px rgba(0,0,0,.15);}
.hinner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.header-logo{height:70px;width:auto;object-fit:contain;}
.hbadge{background:var(--yellow);color:var(--text);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;}
.ystrip{width:100%;background:var(--yellow);text-align:center;padding:7px 16px;font-size:13px;font-weight:700;color:var(--text);}
.main{width:100%;max-width:600px;padding:20px 14px 40px;}
.card{background:var(--white);border-radius:16px;box-shadow:0 4px 24px rgba(0,118,218,.10);border:1px solid var(--border);overflow:hidden;}
.card-head{background:var(--blue-light);border-bottom:2px solid var(--blue);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.card-head i{color:var(--blue);font-size:18px;}
.card-head h2{font-size:15px;font-weight:700;color:var(--text);}
.hcount{font-size:12px;color:var(--muted);margin-right:auto;}
.cbody{padding:18px 20px;}
.upload-zone{border:2px dashed var(--blue);border-radius:12px;padding:2rem 1.5rem;text-align:center;cursor:pointer;background:var(--blue-light);display:block;margin-bottom:14px;transition:.2s;}
.upload-zone:hover{background:#d0e8f8;}
.upload-zone input{display:none;}
.uico{font-size:32px;color:var(--blue);margin-bottom:8px;display:block;}
.upload-zone p{color:var(--muted);font-size:13px;}
.upload-zone p strong{color:var(--blue);font-size:15px;font-weight:700;display:block;margin-bottom:3px;}
.file-ok{background:#eaf6ee;border-radius:10px;padding:11px 16px;display:none;align-items:center;justify-content:space-between;margin-bottom:14px;border:1px solid #b2dfc0;}
.file-ok .fi{display:flex;align-items:center;gap:10px;}
.file-ok .fi i{font-size:20px;color:#28a745;}
.file-ok strong{font-size:14px;color:var(--text);display:block;}
.file-ok small{font-size:12px;color:var(--muted);}
.file-ok button{font-size:12px;font-family:'Heebo',Arial,sans-serif;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer;color:var(--muted);}
.divider{height:3px;background:linear-gradient(to left,var(--yellow),var(--blue));border-radius:2px;margin:4px 0 18px;}

/* MACHINE WRAPPER */
.machine-wrap{position:relative;width:100%;max-width:460px;margin:0 auto 14px;}
.machine-wrap img{width:100%;display:block;user-select:none;-webkit-user-drag:none;}
#anim-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* HANDLE BUTTON — positioned over the right-side handle of the machine */
#handle-btn{
  position:absolute;
  top:18%; right:1%;
  width:11%; height:26%;
  background:transparent;border:none;cursor:pointer;z-index:10;border-radius:8px;
  transition:transform .15s;
}
#handle-btn:not([disabled]):hover{background:rgba(0,118,218,0.10);}
#handle-btn:active:not([disabled]){transform:translateY(7px);}
#handle-pulse{
  position:absolute;top:18%;right:1%;width:11%;height:26%;
  border:2.5px solid var(--blue);border-radius:8px;
  animation:ring 1.5s ease-out infinite;pointer-events:none;z-index:9;display:none;
}
@keyframes ring{0%{opacity:.8;transform:scale(1);}100%{opacity:0;transform:scale(1.4);}}
#handle-hint{
  position:absolute;top:14%;right:13%;
  background:var(--yellow);color:var(--text);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;
  z-index:11;display:none;animation:blink .8s infinite alternate;
}
@keyframes blink{from{opacity:1;}to{opacity:.5;}}

/* WINNER MODAL */
.modal-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
  z-index:1000;align-items:center;justify-content:center;padding:20px;
}
.modal-backdrop.show{display:flex;}
.modal{
  background:var(--white);border-radius:20px;padding:32px 28px;
  max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-trophy{font-size:52px;margin-bottom:8px;display:block;}
.modal-badge{display:inline-block;background:var(--yellow);color:var(--text);font-size:12px;font-weight:700;border-radius:20px;padding:5px 18px;margin-bottom:14px;}
.modal-name{font-size:38px;font-weight:900;color:var(--blue);line-height:1.1;margin-bottom:20px;}
.modal-details{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:14px;}
.modal-row .lbl{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;}
.modal-row .lbl i{color:var(--blue);font-size:13px;}
.modal-row .val{font-weight:700;color:var(--blue);}
.modal-close{width:100%;padding:13px;font-size:15px;font-weight:700;font-family:'Heebo',Arial,sans-serif;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;}
.modal-close:hover{background:var(--blue2);}

.btn-run{width:100%;padding:14px;font-size:17px;font-weight:900;font-family:'Heebo',Arial,sans-serif;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,118,218,.3);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-run:hover:not(:disabled){background:var(--blue2);}
.btn-run:active:not(:disabled){transform:scale(.98);}
.btn-run:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-reset{width:100%;margin-top:10px;padding:10px;font-size:14px;font-family:'Heebo',Arial,sans-serif;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:none;align-items:center;justify-content:center;gap:6px;}
.btn-reset:hover{background:var(--bg);}
footer{margin-top:auto;padding:16px;text-align:center;font-size:11px;color:var(--muted);}
footer span{color:var(--blue);font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/logo.png" alt="לוגו סופרסטאר פלוס" class="header-logo">
    <div class="hbadge">🎰 הגרלת לקוחות</div>
  </div>
</header>
<div class="ystrip">הגרלה שקופה ואקראית לחלוטין — בהצלחה לכולם!</div>

<div class="main">
  <div class="card">
    <div class="card-head">
      <i class="fa-solid fa-file-excel"></i>
      <h2>העלאת רשימת משתתפים</h2>
      <span class="hcount" id="hcount"></span>
    </div>
    <div class="cbody">

      <label class="upload-zone" id="drop-zone">
        <input type="file" id="file-inp" accept=".xlsx,.xls,.csv">
        <i class="fa-solid fa-cloud-arrow-up uico"></i>
        <p><strong>בחר קובץ Excel</strong></p>
        <p>גרור לכאן · .xlsx / .xls / .csv</p>
      </label>

      <div class="file-ok" id="file-ok">
        <div class="fi">
          <i class="fa-solid fa-circle-check"></i>
          <div><strong id="fname"></strong><small id="fcount"></small></div>
        </div>
        <button onclick="clearFile()"><i class="fa-solid fa-rotate-left"></i> החלף</button>
      </div>

      <div class="divider"></div>

      <!-- MACHINE -->
      <div class="machine-wrap" id="machine-wrap">
        <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/nc701_ninja" alt="Ninja NC701" id="machine-img">
        <canvas id="anim-canvas"></canvas>
        <button id="handle-btn" disabled onclick="startLottery()" aria-label="לחץ על הידית להגרלה"></button>
        <div id="handle-pulse"></div>
        <div id="handle-hint">לחץ על הידית ▶</div>
      </div>

      <button class="btn-run" id="btn-run" disabled onclick="startLottery()">
        <i class="fa-solid fa-shuffle"></i> הגרל!
      </button>
      <button class="btn-reset" id="btn-reset" onclick="resetAll()">
        <i class="fa-solid fa-rotate-right"></i> הגרלה חדשה
      </button>
    </div>
  </div>
</div>
<footer>מערכת הגרלות <span>סופרסטאר פלוס</span> · כל הזכויות שמורות</footer>

<!-- WINNER MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <span class="modal-trophy">🍦</span>
    <div class="modal-badge">🏆 הזוכה שלנו בהגרלה הוא/היא</div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-details">
      <div class="modal-row">
        <span class="lbl"><i class="fa-solid fa-calendar-days"></i> קניה מתאריך</span>
        <span class="val" id="modal-date"></span>
      </div>
      <div class="modal-row">
        <span class="lbl"><i class="fa-solid fa-receipt"></i> חשבונית מספר</span>
        <span class="val" id="modal-inv"></span>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">סגור</button>
  </div>
</div>

<script>
/* ─── DATA ─────────────────────────────────────────── */
let rows=[], colN=0, colD=1, colI=2, namesArr=[], winnerRow=null, running=false;

function guessCol(h,pats){for(let p of pats){const i=h.findIndex(x=>p.test(String(x)));if(i>=0)return i;}return -1;}
function fmtDate(v){if(!v)return'';if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;}return String(v);}

document.getElementById('file-inp').addEventListener('change',function(){if(this.files[0])loadFile(this.files[0]);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='#c5dff5';});
dz.addEventListener('dragleave',()=>{dz.style.background='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.background='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

function loadFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const hdrs=json[0]||[];
      rows=json.slice(1).filter(r=>r.some(c=>c!==''));
      colN=guessCol(hdrs,[/שם לקוח/i,/שם/i,/לקוח/i,/name/i,/customer/i]);if(colN<0)colN=0;
      colD=guessCol(hdrs,[/תאריך/i,/date/i]);if(colD<0)colD=1;
      colI=guessCol(hdrs,[/חשבונית/i,/invoice/i,/מספר/i,/number/i]);if(colI<0)colI=2;
      namesArr=rows.map(r=>String(r[colN]||'')).filter(Boolean);
      document.getElementById('drop-zone').style.display='none';
      document.getElementById('file-ok').style.display='flex';
      document.getElementById('fname').textContent=file.name;
      document.getElementById('fcount').textContent=namesArr.length+' רשומות';
      document.getElementById('hcount').textContent=namesArr.length+' משתתפים';
      document.getElementById('btn-run').disabled=false;
      document.getElementById('handle-btn').disabled=false;
      document.getElementById('handle-hint').style.display='';
      document.getElementById('handle-pulse').style.display='';
      initBalls();
    }catch(err){alert('שגיאה בקריאת הקובץ');}
  };
  r.readAsArrayBuffer(file);
}

function clearFile(){
  rows=[];namesArr=[];running=false;
  document.getElementById('drop-zone').style.display='';
  document.getElementById('file-ok').style.display='none';
  document.getElementById('file-inp').value='';
  document.getElementById('hcount').textContent='';
  document.getElementById('btn-run').disabled=true;
  document.getElementById('handle-btn').disabled=true;
  document.getElementById('handle-hint').style.display='none';
  document.getElementById('handle-pulse').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  stopAnim(); clearCanvas();
}

/* ─── CANVAS ─────────────────────────────────────── */
const machineImg = document.getElementById('machine-img');
const canvas = document.getElementById('anim-canvas');
const ctx = canvas.getContext('2d');

/* Image is 554×554.
   Pink bowl:  center (435,370) r≈95×90  → relative: cx=0.785 cy=0.668 rx=0.171 ry=0.162
   Disc nozzle output: (170,240)          → relative: x=0.307 y=0.433
*/
const REL = {
  bowl:  {cx:0.785, cy:0.668, rx:0.165, ry:0.155},
  nozzle:{x:0.307, y:0.443},
};

const COLORS=['#0076DA','#ffcc00','#e84c3d','#28a745','#9b59b6','#e67e22','#1abc9c','#e91e63','#3498db','#f39c12'];
let balls=[], animId=null, phase='idle';
let mixAngle=0, mixSpeed=0, dripProgress=0, winnerName='';
let confetti=[], cW=0, cH=0;

function syncCanvas(){
  const rect=machineImg.getBoundingClientRect();
  cW=rect.width; cH=rect.height;
  canvas.width=cW; canvas.height=cH;
}
machineImg.addEventListener('load',()=>{syncCanvas();});
if(machineImg.complete && machineImg.naturalWidth>0) syncCanvas();
window.addEventListener('resize',syncCanvas);

function bowl(){
  return {
    cx:cW*REL.bowl.cx, cy:cH*REL.bowl.cy,
    rx:cW*REL.bowl.rx, ry:cH*REL.bowl.ry
  };
}
function nozzle(){return {x:cW*REL.nozzle.x, y:cH*REL.nozzle.y};}

function initBalls(){
  if(!namesArr.length)return;
  const {cx,cy,rx,ry}=bowl();
  const count=Math.min(namesArr.length,12);
  balls=[];
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2;
    const dist=0.35+Math.random()*0.3;
    balls.push({
      x:cx+Math.cos(a)*rx*dist,
      y:cy+Math.sin(a)*ry*dist,
      vx:(Math.random()-0.5)*1.5,
      vy:(Math.random()-0.5)*1.5,
      r:Math.min(cW,cH)*0.040,
      color:COLORS[i%COLORS.length],
      label:namesArr[i%namesArr.length],
      angle:0, spin:(Math.random()-0.5)*0.1
    });
  }
  phase='idle'; dripProgress=0; mixAngle=0; mixSpeed=0; confetti=[];
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function loop(){
  ctx.clearRect(0,0,cW,cH);
  const b=bowl();

  if(phase==='idle'){
    drawBowlOverlay(b,0.08);
    drawBalls(b,0);
  } else if(phase==='mixing'){
    mixSpeed=Math.min(mixSpeed+0.009,0.20);
    mixAngle+=mixSpeed;
    drawBowlOverlay(b,0.15+Math.sin(Date.now()/200)*0.04);
    updateBalls(b);
    drawBalls(b,mixAngle);
  } else if(phase==='slowdown'){
    mixSpeed=Math.max(mixSpeed-0.003,0);
    mixAngle+=mixSpeed;
    drawBowlOverlay(b,0.08);
    updateBalls(b);
    drawBalls(b,mixAngle);
    if(mixSpeed<=0.001){phase='drip';dripProgress=0;}
  } else if(phase==='drip'){
    drawBowlOverlay(b,0.05);
    drawBalls(b,mixAngle);
    dripProgress+=1.8;
    drawDrip();
    if(dripProgress>=140){phase='done';spawnConfetti();setTimeout(openModal,500);}
  } else if(phase==='done'){
    drawBalls(b,mixAngle);
    drawFinalCream();
    if(confetti.length>0)drawConfetti();
  }

  if(phase!=='done'||confetti.length>0)
    animId=requestAnimationFrame(loop);
  else
    animId=null;
}

/* ── Bowl glow ── */
function drawBowlOverlay(b,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#90caf9';
  ctx.beginPath();
  ctx.ellipse(b.cx,b.cy,b.rx,b.ry,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

/* ── Balls physics ── */
function updateBalls(b){
  balls.forEach(ball=>{
    const dx=ball.x-b.cx, dy=ball.y-b.cy;
    /* swirl */
    const perpX=-dy*(b.ry/b.rx)*mixSpeed*2.2;
    const perpY= dx*(b.rx/b.ry)*mixSpeed*2.2;
    ball.vx+=(perpX+(Math.random()-0.5)*0.5)*0.1;
    ball.vy+=(perpY+(Math.random()-0.5)*0.5)*0.1;
    ball.vx*=0.90; ball.vy*=0.90;
    ball.x+=ball.vx; ball.y+=ball.vy;
    ball.angle+=ball.spin;
    /* ellipse boundary */
    const nx=(ball.x-b.cx)/b.rx, ny=(ball.y-b.cy)/b.ry;
    if(nx*nx+ny*ny>0.80){
      const ang=Math.atan2(ny,nx);
      ball.x=b.cx+Math.cos(ang)*b.rx*0.76;
      ball.y=b.cy+Math.sin(ang)*b.ry*0.76;
      ball.vx*=-0.4; ball.vy*=-0.4;
    }
  });
}

/* ── Draw balls ── */
function drawBalls(b,spin){
  /* clip to bowl ellipse */
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(b.cx,b.cy,b.rx*1.02,b.ry*1.02,0,0,Math.PI*2);
  ctx.clip();
  balls.forEach((ball,i)=>{
    ctx.save();
    ctx.translate(ball.x,ball.y);
    ctx.rotate(ball.angle+spin*0.4*((i%2)?1:-1));
    ctx.beginPath();
    ctx.arc(0,0,ball.r,0,Math.PI*2);
    ctx.fillStyle=ball.color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle='#fff';
    const fs=Math.round(ball.r*0.68);
    ctx.font=`bold ${fs}px Heebo,Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const lbl=ball.label.length>5?ball.label.slice(0,5)+'…':ball.label;
    ctx.fillText(lbl,0,0);
    ctx.restore();
  });
  ctx.restore();
}

/* ── Drip from nozzle ── */
function drawDrip(){
  const n=nozzle();
  const p=dripProgress;
  ctx.save();

  /* drip stream */
  const streamLen=Math.min(p*0.55, 38);
  if(streamLen>0){
    ctx.fillStyle='#FFFDE7';
    ctx.beginPath();
    ctx.roundRect(n.x-5,n.y,10,streamLen,[0,0,5,5]);
    ctx.fill();
  }

  /* growing scoop */
  if(p>20){
    const scoopCY=n.y+Math.min(p*0.55,38);
    const maxR=cW*0.072;
    const r=Math.min((p-20)/80*maxR,maxR);
    /* scoop body */
    ctx.fillStyle='#FFFDE7';
    ctx.beginPath();
    ctx.arc(n.x,scoopCY,r,Math.PI,0,false);
    ctx.fill();
    /* swirl lines */
    ctx.strokeStyle='#EDE08A';ctx.lineWidth=1.2;
    for(let s=0;s<3;s++){ctx.beginPath();ctx.arc(n.x,scoopCY,r*(0.35+s*0.22),Math.PI*0.15,Math.PI*0.85);ctx.stroke();}
    /* winner text on scoop */
    if(r>maxR*0.65){
      ctx.fillStyle='#1a2a3a';
      const fs=Math.max(Math.round(r*0.38),9);
      ctx.font=`bold ${fs}px Heebo,Arial`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const s=winnerName.length>7?winnerName.slice(0,7)+'…':winnerName;
      ctx.fillText(s,n.x,scoopCY-r*0.08);
    }
    /* cone */
    if(p>65){
      const coneH=Math.min((p-65)/50*cH*0.10,cH*0.10);
      const coneBase=scoopCY+r;
      ctx.fillStyle='#D4A84B';
      ctx.beginPath();
      ctx.moveTo(n.x,coneBase+coneH);
      ctx.lineTo(n.x-r*0.92,coneBase);
      ctx.lineTo(n.x+r*0.92,coneBase);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='#B8843A';ctx.lineWidth=1;
      for(let l=1;l<4;l++){
        const ly=coneBase+coneH*(l/4);
        const lw=r*0.92*(1-l/4);
        ctx.beginPath();ctx.moveTo(n.x-lw,ly);ctx.lineTo(n.x+lw,ly);ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function drawFinalCream(){
  const n=nozzle();
  const maxR=cW*0.072;
  const scoopCY=n.y+38;
  ctx.save();
  ctx.fillStyle='#FFFDE7';
  ctx.beginPath();ctx.arc(n.x,scoopCY,maxR,Math.PI,0,false);ctx.fill();
  ctx.strokeStyle='#EDE08A';ctx.lineWidth=1.2;
  for(let s=0;s<3;s++){ctx.beginPath();ctx.arc(n.x,scoopCY,maxR*(0.35+s*0.22),Math.PI*0.15,Math.PI*0.85);ctx.stroke();}
  ctx.fillStyle='#1a2a3a';
  const fs=Math.max(Math.round(maxR*0.38),9);
  ctx.font=`bold ${fs}px Heebo,Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const s=winnerName.length>7?winnerName.slice(0,7)+'…':winnerName;
  ctx.fillText(s,n.x,scoopCY-maxR*0.08);
  ctx.fillStyle='#D4A84B';
  const coneBase=scoopCY+maxR;
  ctx.beginPath();
  ctx.moveTo(n.x,coneBase+cH*0.10);
  ctx.lineTo(n.x-maxR*0.92,coneBase);
  ctx.lineTo(n.x+maxR*0.92,coneBase);
  ctx.closePath();ctx.fill();
  ctx.restore();
}

/* ── Confetti ── */
function spawnConfetti(){
  const n=nozzle();
  confetti=[];
  for(let i=0;i<60;i++){
    confetti.push({
      x:n.x+(Math.random()-0.5)*20,y:n.y+30,
      vx:(Math.random()-0.5)*5,vy:-(Math.random()*6+3),
      w:5+Math.random()*7,h:3+Math.random()*5,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      angle:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.18,
      gravity:0.16,life:1
    });
  }
}
function drawConfetti(){
  confetti.forEach(c=>{
    c.x+=c.vx;c.y+=c.vy;c.vy+=c.gravity;c.angle+=c.spin;c.life-=0.011;
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle);
    ctx.globalAlpha=Math.max(0,c.life);ctx.fillStyle=c.color;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();
  });
  confetti=confetti.filter(c=>c.life>0);
}

/* ─── LOTTERY FLOW ──────────────────────────────── */
function startLottery(){
  if(running||!namesArr.length)return;
  running=true;
  document.getElementById('handle-hint').style.display='none';
  document.getElementById('handle-pulse').style.display='none';
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> מגריל...';
  document.getElementById('btn-reset').style.display='none';
  /* pick winner */
  const valid=rows.filter(r=>r[colN]);
  winnerRow=valid[Math.floor(Math.random()*valid.length)];
  winnerName=String(winnerRow[colN]||'');
  /* animate */
  phase='mixing'; mixSpeed=0;
  if(!animId) animId=requestAnimationFrame(loop);
  setTimeout(()=>{if(phase==='mixing')phase='slowdown';},4500);
}

function openModal(){
  document.getElementById('modal-name').textContent=winnerName;
  document.getElementById('modal-date').textContent=fmtDate(winnerRow[colD])||'—';
  document.getElementById('modal-inv').textContent=winnerRow[colI]||'—';
  document.getElementById('modal').classList.add('show');
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  document.getElementById('btn-reset').style.display='flex';
  running=false;
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function resetAll(){
  running=false;phase='idle';mixAngle=0;mixSpeed=0;dripProgress=0;confetti=[];
  document.getElementById('modal').classList.remove('show');
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-run').disabled=false;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  document.getElementById('handle-hint').style.display='';
  document.getElementById('handle-pulse').style.display='';
  initBalls();
}

function stopAnim(){if(animId){cancelAnimationFrame(animId);animId=null;}}
function clearCanvas(){ctx.clearRect(0,0,cW,cH);balls=[];confetti=[];phase='idle';}
</script>
