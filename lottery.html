<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגרלת לקוחות – סופרסטאר פלוס</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
:root{--blue:#0076DA;--blue2:#005bab;--blue-light:#e6f3fc;--yellow:#ffcc00;--bg:#f4f7f9;--white:#fff;--text:#1a2a3a;--muted:#6b7c93;--border:#d8e3ec;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',Arial,sans-serif;direction:rtl;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:var(--blue);box-shadow:0 3px 16px rgba(0,0,0,.15);}
.hinner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.header-logo{height:70px;width:auto;object-fit:contain;}
.hbadge{background:var(--yellow);color:var(--text);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;}
.ystrip{width:100%;background:var(--yellow);text-align:center;padding:7px 16px;font-size:13px;font-weight:700;color:var(--text);}
.main{width:100%;max-width:600px;padding:20px 14px 40px;}
.card{background:var(--white);border-radius:16px;box-shadow:0 4px 24px rgba(0,118,218,.10);border:1px solid var(--border);overflow:hidden;}
.card-head{background:var(--blue-light);border-bottom:2px solid var(--blue);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.card-head i{color:var(--blue);font-size:18px;}
.card-head h2{font-size:15px;font-weight:700;color:var(--text);}
.hcount{font-size:12px;color:var(--muted);margin-right:auto;}
.cbody{padding:18px 20px;}
.upload-zone{border:2px dashed var(--blue);border-radius:12px;padding:2rem 1.5rem;text-align:center;cursor:pointer;background:var(--blue-light);display:block;margin-bottom:14px;transition:.2s;}
.upload-zone:hover{background:#d0e8f8;}
.upload-zone input{display:none;}
.uico{font-size:32px;color:var(--blue);margin-bottom:8px;display:block;}
.upload-zone p{color:var(--muted);font-size:13px;}
.upload-zone p strong{color:var(--blue);font-size:15px;font-weight:700;display:block;margin-bottom:3px;}
.file-ok{background:#eaf6ee;border-radius:10px;padding:11px 16px;display:none;align-items:center;justify-content:space-between;margin-bottom:14px;border:1px solid #b2dfc0;}
.file-ok .fi{display:flex;align-items:center;gap:10px;}
.file-ok .fi i{font-size:20px;color:#28a745;}
.file-ok strong{font-size:14px;color:var(--text);display:block;}
.file-ok small{font-size:12px;color:var(--muted);}
.file-ok button{font-size:12px;font-family:'Heebo',Arial,sans-serif;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer;color:var(--muted);}
.divider{height:3px;background:linear-gradient(to left,var(--yellow),var(--blue));border-radius:2px;margin:4px 0 18px;}

/* ANIMATION STAGE */
.anim-stage{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
#scene-canvas{display:block;border-radius:16px;max-width:100%;}
.machine-photo{width:100%;max-width:380px;display:block;margin:0 auto;position:relative;}
.machine-photo img{width:100%;display:block;}
.machine-photo canvas{position:absolute;top:0;left:0;width:100%;height:100%;}

.handle-hint{position:absolute;font-size:11px;font-weight:700;color:var(--text);background:var(--yellow);padding:4px 10px;border-radius:8px;pointer-events:none;animation:bounce 0.9s infinite alternate;white-space:nowrap;z-index:20;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-6px);}}
.handle-overlay{position:absolute;cursor:pointer;border:none;background:transparent;z-index:30;border-radius:50%;}
.handle-overlay:hover{background:rgba(0,118,218,0.12);}
.handle-overlay:active{transform:translateY(5px);}
.pulse-ring{position:absolute;border-radius:50%;border:2px solid var(--blue);opacity:0;animation:ring 1.6s infinite;pointer-events:none;z-index:19;}
@keyframes ring{0%{transform:scale(0.85);opacity:0.7;}100%{transform:scale(1.4);opacity:0;}}

/* WINNER PANEL */
.winner-panel{display:none;background:var(--white);border:3px solid var(--yellow);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,118,218,.12);}
.wp-badge{display:inline-block;background:var(--yellow);color:var(--text);font-size:12px;font-weight:700;border-radius:20px;padding:5px 18px;margin-bottom:12px;}
.wp-name{font-size:36px;font-weight:900;color:var(--blue);line-height:1.1;margin-bottom:16px;}
.wp-details{display:flex;flex-direction:column;gap:8px;max-width:300px;margin:0 auto;}
.wp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:14px;}
.wp-row .lbl{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;}
.wp-row .lbl i{color:var(--blue);font-size:13px;}
.wp-row .val{font-weight:700;color:var(--blue);}

.btn-run{width:100%;padding:14px;font-size:17px;font-weight:900;font-family:'Heebo',Arial,sans-serif;background:var(--blue);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,118,218,.3);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-run:hover:not(:disabled){background:var(--blue2);}
.btn-run:active:not(:disabled){transform:scale(.98);}
.btn-run:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-reset{width:100%;margin-top:10px;padding:10px;font-size:14px;font-family:'Heebo',Arial,sans-serif;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:none;align-items:center;justify-content:center;gap:6px;}
.btn-reset:hover{background:var(--bg);}
footer{margin-top:auto;padding:16px;text-align:center;font-size:11px;color:var(--muted);}
footer span{color:var(--blue);font-weight:700;}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/logo.png" alt="לוגו סופרסטאר פלוס" class="header-logo">
    <div class="hbadge">🎰 הגרלת לקוחות</div>
  </div>
</header>
<div class="ystrip">הגרלה שקופה ואקראית לחלוטין — בהצלחה לכולם!</div>

<div class="main">
  <div class="card">
    <div class="card-head">
      <i class="fa-solid fa-file-excel"></i>
      <h2>העלאת רשימת משתתפים</h2>
      <span class="hcount" id="hcount"></span>
    </div>
    <div class="cbody">

      <label class="upload-zone" id="drop-zone">
        <input type="file" id="file-inp" accept=".xlsx,.xls,.csv">
        <i class="fa-solid fa-cloud-arrow-up uico"></i>
        <p><strong>בחר קובץ Excel</strong></p>
        <p>גרור לכאן · .xlsx / .xls / .csv</p>
      </label>

      <div class="file-ok" id="file-ok">
        <div class="fi">
          <i class="fa-solid fa-circle-check"></i>
          <div><strong id="fname"></strong><small id="fcount"></small></div>
        </div>
        <button onclick="clearFile()"><i class="fa-solid fa-rotate-left"></i> החלף</button>
      </div>

      <div class="divider"></div>

      <!-- ANIMATION STAGE -->
      <div class="anim-stage">
        <div class="machine-photo" id="machine-photo">
          <img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/nc701_ninja" alt="Ninja NC701" id="machine-img">
          <canvas id="overlay-canvas"></canvas>
          <div class="handle-hint" id="handle-hint" style="display:none">משוך להגרלה ↓</div>
          <div class="pulse-ring" id="pulse-ring" style="display:none"></div>
          <button class="handle-overlay" id="handle-overlay" onclick="startLottery()" disabled aria-label="לחץ על הידית להגרלה"></button>
        </div>
      </div>

      <!-- WINNER PANEL -->
      <div class="winner-panel" id="winner-panel">
        <div class="wp-badge">🏆 הזוכה שלנו בהגרלה הוא/היא</div>
        <div class="wp-name" id="wp-name"></div>
        <div class="wp-details">
          <div class="wp-row">
            <span class="lbl"><i class="fa-solid fa-calendar-days"></i> קניה מתאריך</span>
            <span class="val" id="wp-date"></span>
          </div>
          <div class="wp-row">
            <span class="lbl"><i class="fa-solid fa-receipt"></i> חשבונית מספר</span>
            <span class="val" id="wp-inv"></span>
          </div>
        </div>
      </div>

      <button class="btn-run" id="btn-run" disabled onclick="startLottery()">
        <i class="fa-solid fa-shuffle"></i> הגרל!
      </button>
      <button class="btn-reset" id="btn-reset" onclick="resetAll()">
        <i class="fa-solid fa-rotate-right"></i> הגרלה חדשה
      </button>
    </div>
  </div>
</div>
<footer>מערכת הגרלות <span>סופרסטאר פלוס</span> · כל הזכויות שמורות</footer>

<script>
/* ── DATA ───────────────────────────────────────── */
let rows=[], colN=0, colD=1, colI=2, namesArr=[], winnerRow=null;

function guessCol(h,pats){for(let p of pats){const i=h.findIndex(x=>p.test(String(x)));if(i>=0)return i;}return -1;}
function fmtDate(v){if(!v)return'';if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;}return String(v);}

document.getElementById('file-inp').addEventListener('change',function(){if(this.files[0])loadFile(this.files[0]);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='#c5dff5';});
dz.addEventListener('dragleave',()=>{dz.style.background='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.background='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

function loadFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const hdrs=json[0]||[];
      rows=json.slice(1).filter(r=>r.some(c=>c!==''));
      colN=guessCol(hdrs,[/שם לקוח/i,/שם/i,/לקוח/i,/name/i,/customer/i]); if(colN<0)colN=0;
      colD=guessCol(hdrs,[/תאריך/i,/date/i]); if(colD<0)colD=1;
      colI=guessCol(hdrs,[/חשבונית/i,/invoice/i,/מספר/i,/number/i]); if(colI<0)colI=2;
      namesArr=rows.map(r=>String(r[colN]||'')).filter(Boolean);
      document.getElementById('drop-zone').style.display='none';
      document.getElementById('file-ok').style.display='flex';
      document.getElementById('fname').textContent=file.name;
      document.getElementById('fcount').textContent=namesArr.length+' רשומות';
      document.getElementById('hcount').textContent=namesArr.length+' משתתפים';
      document.getElementById('btn-run').disabled=false;
      document.getElementById('handle-overlay').disabled=false;
      showHandleHint();
      initBalls();
    }catch(err){alert('שגיאה בקריאת הקובץ');}
  };
  r.readAsArrayBuffer(file);
}

function clearFile(){
  rows=[];namesArr=[];
  document.getElementById('drop-zone').style.display='';
  document.getElementById('file-ok').style.display='none';
  document.getElementById('file-inp').value='';
  document.getElementById('hcount').textContent='';
  document.getElementById('btn-run').disabled=true;
  document.getElementById('handle-overlay').disabled=true;
  document.getElementById('winner-panel').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  hideHandleHint();
  stopAnim();
  clearCanvas();
}

/* ── CANVAS OVERLAY ─────────────────────────────── */
const img = document.getElementById('machine-img');
const canvas = document.getElementById('overlay-canvas');
const ctx = canvas.getContext('2d');

const BALL_COLORS = ['#0076DA','#ffcc00','#28a745','#e84c3d','#9b59b6','#e67e22','#1abc9c','#e91e9e'];

/* bowl region (relative 0-1 within image) — the blender bowl area */
const BOWL = { cx:0.28, cy:0.38, rx:0.22, ry:0.19 };
/* nozzle tip */
const NOZZLE = { x:0.22, y:0.62 };

let cW=0, cH=0;
let balls=[], animId=null, phase='idle'; // idle | mixing | slowdown | drip | done
let dripY=0, dripAlpha=0, winnerName='', mixAngle=0, mixSpeed=0;
let confetti=[];

function resizeCanvas(){
  const rect = img.getBoundingClientRect();
  cW = rect.width; cH = rect.height;
  canvas.width = cW; canvas.height = cH;
  positionHandleUI();
}

function positionHandleUI(){
  /* handle is on the right side of the machine ~top 20-55% */
  const hint = document.getElementById('handle-hint');
  const overlay = document.getElementById('handle-overlay');
  const ring = document.getElementById('pulse-ring');
  const bw = cW*0.13, bh = cH*0.28;
  const bx = cW*0.86, by = cH*0.20;
  [hint,overlay,ring].forEach(el=>{
    el.style.right = (cW - bx - bw)+'px';
    el.style.top   = (by - 28)+'px';
    el.style.width = bw+'px';
    el.style.height= bh+'px';
  });
  hint.style.top = (by - 36)+'px';
  hint.style.right= (cW - bx - bw - 10)+'px';
  hint.style.width='auto'; hint.style.height='auto';
}

img.addEventListener('load', ()=>{ resizeCanvas(); });
if(img.complete) resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── BALLS ──────────────────────────────────────── */
function initBalls(){
  if(!namesArr.length) return;
  const count = Math.min(namesArr.length, 14);
  const bx = cW * BOWL.cx, by = cH * BOWL.cy;
  const rx = cW * BOWL.rx, ry = cH * BOWL.ry;
  balls = [];
  for(let i=0;i<count;i++){
    const angle = (i/count)*Math.PI*2;
    const r = Math.random()*rx*0.5;
    balls.push({
      x: bx + Math.cos(angle)*r,
      y: by + Math.sin(angle)*r*0.7,
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2,
      r: Math.min(cW,cH)*0.038,
      color: BALL_COLORS[i%BALL_COLORS.length],
      name: namesArr[i%namesArr.length],
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.12
    });
  }
  phase = 'idle';
  mixAngle=0; mixSpeed=0;
  if(animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(drawFrame);
}

function drawFrame(){
  ctx.clearRect(0,0,cW,cH);

  if(phase==='idle'){
    drawBowlGlow(0.12);
    drawBalls(0);
  } else if(phase==='mixing'){
    mixSpeed = Math.min(mixSpeed+0.012, 0.22);
    mixAngle += mixSpeed;
    drawBowlGlow(0.22);
    updateBalls();
    drawBalls(mixAngle);
  } else if(phase==='slowdown'){
    mixSpeed = Math.max(mixSpeed-0.004, 0);
    mixAngle += mixSpeed;
    drawBowlGlow(0.10);
    updateBalls();
    drawBalls(mixAngle);
    if(mixSpeed <= 0){ phase='drip'; dripY=0; dripAlpha=0; }
  } else if(phase==='drip'){
    drawBowlGlow(0.06);
    drawBalls(mixAngle);
    drawDrip();
  } else if(phase==='done'){
    drawBalls(mixAngle);
    drawIceCream();
    drawConfetti();
  }

  if(phase!=='done'||confetti.length>0) animId = requestAnimationFrame(drawFrame);
}

function updateBalls(){
  const bx=cW*BOWL.cx, by=cH*BOWL.cy, rx=cW*BOWL.rx, ry=cH*BOWL.ry;
  balls.forEach(b=>{
    /* swirl force */
    const dx=b.x-bx, dy=b.y-by;
    const perpX = -dy/ry*ry*mixSpeed*1.8;
    const perpY =  dx/rx*rx*mixSpeed*1.8;
    b.vx += perpX*0.08 + (Math.random()-0.5)*0.4;
    b.vy += perpY*0.08 + (Math.random()-0.5)*0.4;
    b.vx *= 0.88; b.vy *= 0.88;
    b.x += b.vx; b.y += b.vy;
    b.angle += b.spin;
    /* keep in bowl ellipse */
    const nx=(b.x-bx)/rx, ny=(b.y-by)/ry;
    if(nx*nx+ny*ny > 0.82){
      const ang=Math.atan2(ny,nx);
      b.x = bx + Math.cos(ang)*rx*0.78;
      b.y = by + Math.sin(ang)*ry*0.78;
      b.vx *= -0.5; b.vy *= -0.5;
    }
  });
}

function drawBowlGlow(alpha){
  const bx=cW*BOWL.cx, by=cH*BOWL.cy, rx=cW*BOWL.rx, ry=cH*BOWL.ry;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#0076DA';
  ctx.beginPath();
  ctx.ellipse(bx,by,rx,ry,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBalls(spin){
  balls.forEach((b,i)=>{
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle + spin*0.5*((i%2===0)?1:-1));
    /* ball */
    ctx.beginPath();
    ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    /* name */
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(b.r*0.72)}px Heebo,Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const short = b.name.length>5 ? b.name.slice(0,5)+'…' : b.name;
    ctx.fillText(short,0,0);
    ctx.restore();
  });
}

/* ── DRIP ───────────────────────────────────────── */
function drawDrip(){
  const nx=cW*NOZZLE.x, ny=cH*NOZZLE.y;
  dripY += 3.5;
  dripAlpha = Math.min(dripAlpha+0.04, 1);

  /* stream */
  ctx.save();
  ctx.globalAlpha = dripAlpha;
  const streamH = Math.min(dripY, cH*0.12);
  ctx.fillStyle='#FFF8DC';
  ctx.beginPath();
  ctx.roundRect(nx-5, ny, 10, streamH, [0,0,6,6]);
  ctx.fill();

  /* growing swirl scoop */
  if(dripY > 30){
    const scoopY = ny + Math.min(dripY, cH*0.12);
    const maxR = cW*0.07;
    const r = Math.min((dripY-30)/60 * maxR, maxR);
    /* scoop */
    ctx.fillStyle='#FFFDE7';
    ctx.beginPath();
    ctx.arc(nx, scoopY, r, Math.PI, 0);
    ctx.fill();
    /* swirls */
    ctx.strokeStyle='#F0E070'; ctx.lineWidth=1.5;
    for(let s=0;s<3;s++){
      ctx.beginPath();
      ctx.arc(nx, scoopY, r*(0.4+s*0.2), Math.PI*0.1, Math.PI*0.9);
      ctx.stroke();
    }
    /* winner name on scoop */
    if(r > maxR*0.7){
      ctx.fillStyle='#1a2a3a';
      ctx.font=`bold ${Math.round(r*0.42)}px Heebo,Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const n = winnerName.length>8 ? winnerName.slice(0,8)+'…' : winnerName;
      ctx.fillText(n, nx, scoopY-r*0.1);
    }
    /* cone */
    if(dripY > 70){
      const coneH = Math.min((dripY-70)/40 * cH*0.10, cH*0.10);
      ctx.fillStyle='#D4A84B';
      ctx.beginPath();
      ctx.moveTo(nx, scoopY+r+coneH);
      ctx.lineTo(nx-r*0.95, scoopY+r);
      ctx.lineTo(nx+r*0.95, scoopY+r);
      ctx.closePath();
      ctx.fill();
      /* cone lines */
      ctx.strokeStyle='#B8843A'; ctx.lineWidth=1;
      for(let l=1;l<4;l++){
        const ly = scoopY+r+coneH*(l/4);
        const lw = r*0.95*(1-l/4);
        ctx.beginPath(); ctx.moveTo(nx-lw, ly); ctx.lineTo(nx+lw, ly); ctx.stroke();
      }
    }
  }
  ctx.restore();

  if(dripY > cH*0.22){
    phase='done';
    spawnConfetti();
    setTimeout(showWinnerPanel, 600);
  }
}

function drawIceCream(){
  const nx=cW*NOZZLE.x, ny=cH*NOZZLE.y;
  const maxR=cW*0.07, scoopY=ny+cH*0.12, coneH=cH*0.10;
  ctx.save();
  ctx.fillStyle='#FFFDE7';
  ctx.beginPath(); ctx.arc(nx,scoopY,maxR,Math.PI,0); ctx.fill();
  ctx.strokeStyle='#F0E070'; ctx.lineWidth=1.5;
  for(let s=0;s<3;s++){ ctx.beginPath(); ctx.arc(nx,scoopY,maxR*(0.4+s*0.2),Math.PI*0.1,Math.PI*0.9); ctx.stroke(); }
  ctx.fillStyle='#1a2a3a';
  ctx.font=`bold ${Math.round(maxR*0.42)}px Heebo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const n=winnerName.length>8?winnerName.slice(0,8)+'…':winnerName;
  ctx.fillText(n,nx,scoopY-maxR*0.1);
  ctx.fillStyle='#D4A84B';
  ctx.beginPath(); ctx.moveTo(nx,scoopY+maxR+coneH); ctx.lineTo(nx-maxR*0.95,scoopY+maxR); ctx.lineTo(nx+maxR*0.95,scoopY+maxR); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#B8843A'; ctx.lineWidth=1;
  for(let l=1;l<4;l++){ const ly=scoopY+maxR+coneH*(l/4),lw=maxR*0.95*(1-l/4); ctx.beginPath(); ctx.moveTo(nx-lw,ly); ctx.lineTo(nx+lw,ly); ctx.stroke(); }
  ctx.restore();
}

/* ── CONFETTI ───────────────────────────────────── */
function spawnConfetti(){
  const nx=cW*NOZZLE.x, ny=cH*(NOZZLE.y+0.12);
  confetti=[];
  for(let i=0;i<55;i++){
    confetti.push({
      x:nx+(Math.random()-0.5)*30, y:ny,
      vx:(Math.random()-0.5)*5, vy:-(Math.random()*6+2),
      w:6+Math.random()*7, h:3+Math.random()*5,
      color:BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)],
      angle:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*0.2,
      gravity:0.18, life:1
    });
  }
}
function drawConfetti(){
  confetti.forEach((c,i)=>{
    c.x+=c.vx; c.y+=c.vy; c.vy+=c.gravity; c.angle+=c.spin; c.life-=0.012;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.angle);
    ctx.globalAlpha=Math.max(0,c.life); ctx.fillStyle=c.color;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore();
  });
  confetti=confetti.filter(c=>c.life>0);
}

/* ── HANDLE UI ──────────────────────────────────── */
function showHandleHint(){
  document.getElementById('handle-hint').style.display='';
  document.getElementById('pulse-ring').style.display='';
}
function hideHandleHint(){
  document.getElementById('handle-hint').style.display='none';
  document.getElementById('pulse-ring').style.display='none';
}

/* ── LOTTERY FLOW ───────────────────────────────── */
let running=false;
function startLottery(){
  if(running||!namesArr.length) return;
  running=true;
  hideHandleHint();
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> מגריל...';
  document.getElementById('winner-panel').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  /* pick winner */
  const valid=rows.filter(r=>r[colN]);
  winnerRow=valid[Math.floor(Math.random()*valid.length)];
  winnerName=String(winnerRow[colN]||'');
  /* mix for 4s then slow */
  phase='mixing'; mixSpeed=0;
  setTimeout(()=>{ phase='slowdown'; }, 4000);
}

function showWinnerPanel(){
  document.getElementById('wp-name').textContent=winnerName;
  document.getElementById('wp-date').textContent=fmtDate(winnerRow[colD])||'—';
  document.getElementById('wp-inv').textContent=winnerRow[colI]||'—';
  document.getElementById('winner-panel').style.display='';
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  document.getElementById('btn-reset').style.display='flex';
  running=false;
}

function resetAll(){
  running=false; phase='idle'; mixAngle=0; mixSpeed=0; dripY=0;
  document.getElementById('winner-panel').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-run').disabled=false;
  document.getElementById('btn-run').innerHTML='<i class="fa-solid fa-shuffle"></i> הגרל!';
  showHandleHint();
  confetti=[];
  initBalls();
}

function stopAnim(){ if(animId){cancelAnimationFrame(animId);animId=null;} }
function clearCanvas(){ ctx.clearRect(0,0,cW,cH); balls=[]; confetti=[]; phase='idle'; }
</script>
