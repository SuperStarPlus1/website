<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סופר סטאר פלוס</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --blue: #0076DA; --yellow: #ffcc00; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); direction: rtl; }

        header { background: var(--blue); position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; height: 100%; padding: 0 20px; justify-content: flex-start; }
        
        .logo img { height: 170px; margin-top: 30px; cursor: pointer; margin-left: 30px; }
        
        .nav-links { list-style: none; display: flex; gap: 10px; padding: 0; margin: 0; }
        .nav-links li { color: white; cursor: pointer; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.95rem; white-space: nowrap; }
        .nav-links li.active { background: var(--yellow); color: var(--blue); }

        main { max-width: 100%; margin: 120px auto 50px; }
        .content-wrap { max-width: 1200px; margin: 60px auto 0; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }

        .news-ticker {
            background: transparent; color: var(--blue); height: 40px; line-height: 40px; 
            font-weight: bold; font-size: 1.1rem; overflow: hidden; white-space: nowrap; 
            position: absolute; top: 85px; width: 100%; z-index: 999;
        }
        .ticker-content {
            display: inline-block; position: absolute; animation: ticker 25s linear infinite; left: 0; will-change: transform;
        }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100vw); } }

        .video-box { max-width: 720px; max-height: 350px; margin: 0 auto 50px; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; height: 100%; max-height: 350px; display: block; object-fit: contain; }

        .slider-wrap { width: 100%; overflow: hidden; background: transparent; padding: 40px 0; margin-bottom: 40px; }
        .slider-track { display: flex; width: max-content; animation: scroll 90s linear infinite; gap: 30px; padding: 20px; }
        /* עיצוב כרטיס מבצע סליידר */
        .slider-track .card { width: 220px; flex-shrink: 0; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: contain; cursor: pointer; margin-bottom: 10px; }
        .card h3 { font-size: 0.95rem; margin: 10px 0; color: #333; line-height: 1.2; height: 2.4em; overflow: hidden; }
        .price { color: #d32f2f; font-weight: bold; font-size: 1.4rem; margin: 5px 0; }
        .valid-date { font-size: 0.75rem; color: #666; background: #fff3e0; padding: 3px; border-radius: 5px; margin-top: 5px; }
        .barcode { font-size: 0.7rem; color: #999; margin-top: auto; padding-top: 8px; border-top: 1px solid #f9f9f9; }

        /* שאר העיצובים נשמרים כפי שהיו */
        .contact-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .dept-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-bottom: 5px solid #eee; }
        .work-hours { font-weight: bold; color: var(--blue); font-size: 1.1rem; margin-top: 10px; display: block; }
        .contact-footer { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; padding: 20px; background: #fff; border-radius: 15px; text-align: center; }
        .map-container { width: 100%; height: 350px; border-radius: 20px; overflow: hidden; border: 3px solid var(--blue); }
        .fab { position: fixed; bottom: 25px; left: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .f-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .waze { background-color: #33CCFF; }
        .whatsapp { background-color: #25D366; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 90%; border: 3px solid #fff; border-radius: 10px; }
        h2.section-title { border-right: 6px solid var(--yellow); padding-right: 15px; margin: 40px 0 20px; color: var(--blue); }
        .image-roll-container { width: 100%; max-width: 800px; margin: 20px auto; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 8px; cursor: pointer; position: relative; }
        .roll-item img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; margin: 0 auto; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

<header>
    <div class="nav-container">
        <div class="logo" onclick="nav('home')"><img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/logo.png"></div>
        <ul class="nav-links">
            <li class="active" onclick="nav('home', this)">דף הבית</li>
            <li onclick="nav('catalog-page', this)">קטלוג</li>
            <li onclick="nav('promos-page', this)">מבצעים</li>
            <li onclick="nav('new-page', this)">חדש על המדף</li>
            <li onclick="nav('about-page', this)">אודות</li>
            <li onclick="nav('career-page', this)">קריירה</li>
            <li onclick="nav('directions-page', this)">צור קשר</li>
            <li style="margin-right:20px; display:flex; gap:10px;">
                <a href="https://www.facebook.com/SuperStarPLus" target="_blank" style="color:white"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://www.instagram.com/super.star.plus/" target="_blank" style="color:white"><i class="fa-brands fa-instagram"></i></a>
            </li>
        </ul>
    </div>
</header>

<div class="news-ticker">
    <div class="ticker-content">חדש! כרטיס מתנה נטען סופרסטאר. לפרטים בוואטסאפ: 04-907-6772</div>
</div>

<main>
    <div id="home" class="page active">
        <div class="content-wrap">
            <div class="video-box"><video autoplay muted loop playsinline controls><source src="https://res.cloudinary.com/dj56w7nb9/video/upload/v1/promo_video.mp4"></video></div>
            <div class="image-roll-container" id="imageRoll" onclick="openImage(this)">
                <div class="roll-item"><img src="" id="img1"></div>
            </div>
            <h2 class="section-title">המבצעים החמים שלנו</h2>
            <div class="slider-wrap"><div class="slider-track" id="promo-slider"></div></div>
            <h2 class="section-title">חדש על המדף</h2>
            <div id="new-home" class="grid"></div>
        </div>
    </div>

    <div id="catalog-page" class="page">
        <div class="content-wrap">
            <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px; display: flex; flex-wrap: wrap; gap: 10px;">
                <input type="text" id="search" placeholder="חפש מוצר או ברקוד..." oninput="runFilter()" style="flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 10px;">
                <select id="cat-select" onchange="setCategory(this.value)" style="flex: 1; padding: 12px; border: 1px solid var(--blue); border-radius: 10px;"></select>
            </div>
            <div id="catalog-grid" class="grid"></div>
        </div>
    </div>

    <div id="promos-page" class="page"><div class="content-wrap"><h2 class="section-title">כל המבצעים</h2><div id="promo-full" class="grid"></div></div></div>
    <div id="new-page" class="page"><div class="content-wrap"><h2 class="section-title">חדש על המדף</h2><div id="new-full" class="grid"></div></div></div>
    
    <div id="about-page" class="page">
        <div class="content-wrap">
            <div style="text-align:center; padding:40px; background:var(--blue); color:white; border-radius:20px;">
                <h1>סופרסטאר פלוס</h1>
                <p>חוויית קנייה יוצאת דופן לכל המשפחה.</p>
            </div>
        </div>
    </div>

    <div id="career-page" class="page">
        <div class="content-wrap"><h2 class="section-title">דרושים</h2><div id="jobs-grid" class="grid"></div></div>
    </div>

    <div id="directions-page" class="page">
        <div class="content-wrap">
            <h2 class="section-title">שעות פתיחה</h2>
            <div class="contact-section">
                <div class="dept-card"><h3>סופרמרקט</h3><span class="work-hours">08:00 - 22:00</span></div>
            </div>
            <div class="map-container"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3358.3705001334915!2d35.2610968758066!3d32.91986077360408!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151c3301fdace701%3A0x8cd5dc779c00b884!2z16HXldeX16jXodeY16DXqCDXpNeo16XXodeo!5e0!3m2!1siw!2sil!4v1708170000000!5m2!1siw!2sil" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="imageModal" onclick="this.style.display='none'"><img src="" id="modalImg"></div>

<div class="fab">
    <a href="https://wa.me/97249076772" class="f-btn whatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
    <a href="https://waze.com/ul?ll=32.92348,35.25752&navigate=yes" class="f-btn waze" target="_blank"><i class="fa-brands fa-waze"></i></a>
</div>

<script>
    const CLOUD = "dj56w7nb9";
    const CSV_MAIN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?output=csv";
    const CSV_OFFERS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?gid=2140417942&single=true&output=csv"; 
    
    let allItems = [];
    let curCat = "הכל";

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
        if(el) el.classList.add('active');
        window.scrollTo(0,0);
    }

    function zoom(url) {
        document.getElementById('lb-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    // פונקציה חדשה להצגת המבצעים מהגיליון OFFERS
    function renderOffers(offers) {
        const slider = document.getElementById('promo-slider');
        const grid = document.getElementById('promo-full');
        
        const html = offers.map(o => `
            <div class="card">
                <img src="https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${o.Barcode}.jpg" onclick="zoom(this.src)" onerror="this.src=''">
                <h3>${o.Discreption || o.Name}</h3>
                <div class="price">₪${o.UnitPrice}</div>
                <div class="valid-date">בתוקף עד: ${o.Valid}</div>
                <div class="barcode">ברקוד: ${o.Barcode}</div>
            </div>`).join('');

        if(slider) slider.innerHTML = html + html; // כפול בשביל הסליידר
        if(grid) grid.innerHTML = html;
    }

    // פונקציה להצגת מוצרי הקטלוג הכללי
    function renderCatalog(data) {
        const container = document.getElementById('catalog-grid');
        container.innerHTML = data.map(i => `
            <div class="card">
                <img src="https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${i.Barcode}.jpg" onclick="zoom(this.src)" onerror="this.src=''">
                <h3>${i.Name}</h3>
                <div class="price">₪${i.Price}</div>
                <div class="barcode">ברקוד: ${i.Barcode}</div>
            </div>`).join('');
    }

    function setCategory(cat) { curCat = cat; runFilter(); }

    function runFilter() {
        const term = document.getElementById('search').value.toLowerCase();
        const field = window.catFieldName || 'Category';
        const filtered = allItems.filter(i => {
            const iCat = i[field] || "";
            return (i.Name.toLowerCase().includes(term) || i.Barcode.includes(term)) && 
                   (curCat === "הכל" || iCat === curCat);
        });
        renderCatalog(filtered);
    }

    async function loadCloud(tag, divId, type='grid') {
        try {
            const r = await fetch(`https://res.cloudinary.com/${CLOUD}/image/list/${tag}.json`);
            const d = await r.json();
            const html = d.resources.map(f => {
                const url = `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/${f.public_id}.${f.format}`;
                return `<div class="card" onclick="zoom('${url}')"><img src="${url}"></div>`;
            }).join('');
            document.getElementById(divId).innerHTML = html;
        } catch(e) {}
    }

    function start() {
        // טעינת תכנים משלימים
        loadCloud('newproducts', 'new-home');
        loadCloud('newproducts', 'new-full');
        loadCloud('jobs', 'jobs-grid');

        // טעינת קובץ המבצעים (OFFERS)
        Papa.parse(CSV_OFFERS, {
            download: true,
            header: true,
            complete: results => {
                const offers = results.data.filter(o => o.Barcode);
                renderOffers(offers);
            }
        });

        // טעינת הקטלוג הראשי
        Papa.parse(CSV_MAIN, {
            download: true,
            header: true,
            complete: r => {
                allItems = r.data.filter(x => x.Barcode);
                const first = allItems[0];
                const catField = first.hasOwnProperty('Category') ? 'Category' : 
                                 first.hasOwnProperty('category') ? 'category' : 
                                 first.hasOwnProperty('קטגוריה') ? 'קטגוריה' : null;
                if (catField) {
                    window.catFieldName = catField;
                    const cats = ["הכל", ...new Set(allItems.map(x => x[catField]))].filter(c => c).sort();
                    document.getElementById('cat-select').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
                }
                renderCatalog(allItems);
            }
        });
    }

    async function loadRoll() {
        try {
            const r = await fetch(`https://res.cloudinary.com/${CLOUD}/image/list/pictureroll.json`);
            const d = await r.json();
            if(d.resources.length) {
                const rnd = d.resources[Math.floor(Math.random()*d.resources.length)];
                document.getElementById('img1').src = `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/${rnd.public_id}.${rnd.format}`;
            }
        } catch(e){}
    }

    function openImage(container) {
        document.getElementById('modalImg').src = container.querySelector('img').src;
        document.getElementById('imageModal').style.display = 'flex';
    }

    window.onload = () => { start(); loadRoll(); setInterval(loadRoll, 8000); };
</script>
</body>
</html>
