<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superstar - סופר סטאר</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --blue: #003399;
            --yellow: #ffcc00;
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--gray); color: #333; }

        header { background: var(--blue); color: var(--white); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { max-width: 150px; cursor: pointer; }

        nav { background: var(--yellow); padding: 0.5rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        nav button { background: var(--blue); color: var(--white); border: none; padding: 0.6rem 1.2rem; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        section { display: none; }
        section.active { display: block; }

        .section-title { text-align: center; margin: 2rem 0; color: var(--blue); border-bottom: 3px solid var(--yellow); display: inline-block; width: 100%; padding-bottom: 10px; }

        /* Slider */
        .slider-container { overflow: hidden; position: relative; background: var(--white); padding: 20px 0; margin-bottom: 30px; }
        .slider-track { display: flex; gap: 20px; animation: scroll 40s linear infinite; width: max-content; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--white); border-radius: 8px; padding: 15px; text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 100%;
        }
        .card img { max-width: 100%; height: 180px; object-fit: contain; margin-bottom: 10px; cursor: pointer; }
        
        .price { font-size: 1.4rem; font-weight: bold; color: var(--blue); margin: 10px 0; }
        .barcode { font-size: 0.8rem; color: #999; margin-top: auto; }
        .valid-until { font-size: 0.8rem; color: #d32f2f; font-weight: bold; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input, select { padding: 10px; border: 2px solid var(--blue); border-radius: 8px; }

        #zoom-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; 
        }
        #zoom-modal img { max-width: 90%; max-height: 90%; }

        footer { background: var(--blue); color: var(--white); padding: 2rem; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <img src="https://res.cloudinary.com/dts967v67/image/upload/v1/logo.png" class="logo" onclick="showSection('home')">
</header>

<nav>
    <button onclick="showSection('home')">דף הבית</button>
    <button onclick="showSection('offers')">מבצעים</button>
    <button onclick="showSection('catalog')">קטלוג מוצרים</button>
    <button onclick="showSection('new')">חדש על המדף</button>
    <button onclick="showSection('career')">קריירה</button>
</nav>

<div class="container">
    <section id="home" class="active">
        <h2 class="section-title">מבצעים חמים</h2>
        <div class="slider-container">
            <div id="promo-slider" class="slider-track"></div>
        </div>
        <h2 class="section-title">חדש על המדף</h2>
        <div id="new-home" class="grid"></div>
    </section>

    <section id="offers">
        <h2 class="section-title">כל המבצעים</h2>
        <div id="promo-full" class="grid"></div>
    </section>

    <section id="catalog">
        <h2 class="section-title">קטלוג מוצרים</h2>
        <div class="controls">
            <input type="text" id="search" placeholder="חפש מוצר..." oninput="filterCatalog()">
            <select id="cat-select" onchange="filterCatalog()"></select>
        </div>
        <div id="catalog-grid" class="grid"></div>
    </section>

    <section id="new">
        <h2 class="section-title">חדש על המדף</h2>
        <div id="new-full" class="grid"></div>
    </section>

    <section id="career">
        <h2 class="section-title">דרושים</h2>
        <div id="jobs-grid" class="grid"></div>
    </section>
</div>

<div id="zoom-modal" onclick="this.style.display='none'"><img id="zoom-img"></div>

<footer>
    <p>📍 מג'ד אל כרום, רחוב סלאח א-דין 169 | 📞 054-6716007</p>
    <p>© 2026 Superstar</p>
</footer>

<script>
    const CLOUD = "dts967v67";
    const CATALOG_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?output=csv";
    // *** וודא שזה הקישור הנכון לקובץ ה-OFFERS כ-CSV ***
    const OFFERS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfL58m9K2GZ6E9B56F7tG2O0N0k_Uo-Pj8u1A3y-qU9v9b-8v_G7Yy-S8-rU-N-U/pub?output=csv";

    let allItems = [];
    let allOffers = [];
    let catField = '';

    async function start() {
        // טעינת מבצעים מהשיטס
        Papa.parse(OFFERS_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: r => {
                allOffers = r.data.filter(x => x.Barcode);
                renderOffers(allOffers);
            }
        });

        // טעינת קטלוג
        Papa.parse(CATALOG_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: r => {
                allItems = r.data.filter(x => x.Barcode);
                setupCats(allItems);
                renderCatalog(allItems);
            }
        });

        // תמונות מענן
        loadCloud('newproducts', 'new-home');
        loadCloud('newproducts', 'new-full');
        loadCloud('jobs', 'jobs-grid');
    }

    function renderOffers(data) {
        const html = data.map(i => {
            const imgUrl = `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${i.Barcode.trim()}.jpg`;
            const unit = (i.Discreption?.includes('ק"ג') || i.UnitPrice?.includes('ק"ג')) ? 'ק"ג' : 'יח\'';
            return `
                <div class="card" style="border: 2px solid var(--yellow);">
                    <img src="${imgUrl}" onclick="zoom('${imgUrl}')" onerror="this.src='https://res.cloudinary.com/${CLOUD}/image/upload/v1/logo.png'">
                    <h3>${i.Discreption || 'מבצע'}</h3>
                    <div class="price">₪${i.UnitPrice} <span style="font-size:0.8rem">ל${unit}</span></div>
                    ${i.Valid ? `<div class="valid-until">עד: ${i.Valid}</div>` : ''}
                    <div class="barcode">ברקוד: ${i.Barcode}</div>
                </div>`;
        }).join('');
        document.getElementById('promo-full').innerHTML = html;
        document.getElementById('promo-slider').innerHTML = html + html;
    }

    function renderCatalog(data) {
        document.getElementById('catalog-grid').innerHTML = data.map(i => {
            const imgUrl = `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${i.Barcode.trim()}.jpg`;
            return `
                <div class="card">
                    <img src="${imgUrl}" onclick="zoom('${imgUrl}')" onerror="this.src='https://res.cloudinary.com/${CLOUD}/image/upload/v1/logo.png'">
                    <h3>${i.Name || i.Product || i['שם מוצר']}</h3>
                    <div class="price">₪${i.Price || i['מחיר']}</div>
                    <div class="barcode">ברקוד: ${i.Barcode}</div>
                </div>`;
        }).join('');
    }

    async function loadCloud(tag, divId) {
        try {
            const r = await fetch(`https://res.cloudinary.com/${CLOUD}/image/list/${tag}.json`);
            const d = await r.json();
            document.getElementById(divId).innerHTML = d.resources.map(f => {
                const url = `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/${f.public_id}.${f.format}`;
                return `<div class="card"><img src="${url}" onclick="zoom('${url}')"></div>`;
            }).join('');
        } catch(e) {}
    }

    function setupCats(data) {
        const first = data[0];
        catField = first.hasOwnProperty('Category') ? 'Category' : first.hasOwnProperty('קטגוריה') ? 'קטגוריה' : '';
        if(catField) {
            const cats = ["הכל", ...new Set(data.map(x => x[catField]))].filter(Boolean);
            document.getElementById('cat-select').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }
    }

    function filterCatalog() {
        const term = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('cat-select').value;
        const filtered = allItems.filter(i => {
            const matchTerm = (i.Name || i.Barcode || "").toLowerCase().includes(term);
            const matchCat = cat === "הכל" || i[catField] === cat;
            return matchTerm && matchCat;
        });
        renderCatalog(filtered);
    }

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function zoom(url) {
        document.getElementById('zoom-img').src = url;
        document.getElementById('zoom-modal').style.display = 'flex';
    }

    window.onload = start;
</script>
</body>
</html>
