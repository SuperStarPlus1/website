<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Star Plus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --blue: #0076DA; --yellow: #ffcc00; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); direction: rtl; }
        header { background: var(--blue); position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; height: 100%; padding: 0 20px; }
        .logo img { height: 170px; margin-top: 30px; cursor: pointer; margin-left: 30px; }
        .nav-links { list-style: none; display: flex; gap: 10px; padding: 0; margin: 0; }
        .nav-links li { color: white; cursor: pointer; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .nav-links li.active { background: var(--yellow); color: var(--blue); }
        main { max-width: 1200px; margin: 120px auto 50px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 10px; }
        .price { color: #d32f2f; font-weight: bold; font-size: 1.5rem; margin: 10px 0; }
        .valid-tag { font-size: 0.8rem; background: #fff3e0; color: #e65100; padding: 5px; border-radius: 5px; display: inline-block; }
        .slider-wrap { width: 100%; overflow: hidden; padding: 20px 0; }
        .slider-track { display: flex; gap: 20px; width: max-content; animation: scroll 60s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

<header>
    <div class="nav-container">
        <div class="logo" onclick="nav('home')"><img src="https://res.cloudinary.com/dj56w7nb9/image/upload/f_auto,q_auto/logo.png"></div>
        <ul class="nav-links">
            <li class="active" onclick="nav('home', this)">דף הבית</li>
            <li onclick="nav('catalog-page', this)">קטלוג</li>
            <li onclick="nav('promos-page', this)">מבצעים</li>
            <li onclick="nav('directions-page', this)">צור קשר</li>
        </ul>
    </div>
</header>

<main>
    <div id="home" class="page active">
        <h2 style="border-right: 5px solid var(--yellow); padding-right: 15px;">מבצעים לוהטים</h2>
        <div class="slider-wrap"><div class="slider-track" id="promo-slider"></div></div>
    </div>

    <div id="catalog-page" class="page">
        <div style="margin-bottom: 20px;">
            <input type="text" id="search" placeholder="חפש מוצר..." oninput="runFilter()" style="padding: 10px; width: 250px; border-radius: 8px; border: 1px solid #ddd;">
        </div>
        <div id="catalog-grid" class="grid"></div>
    </div>

    <div id="promos-page" class="page">
        <h2 style="border-right: 5px solid var(--yellow); padding-right: 15px;">כל המבצעים</h2>
        <div id="promo-full" class="grid"></div>
    </div>

    <div id="directions-page" class="page">
        <h2>סופרסטאר פלוס - מג'ד אל כרום</h2>
        <p>רחוב סלאח א-דין 169</p>
    </div>
</main>

<script>
    const CLOUD = "dj56w7nb9";
    const CSV_MAIN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?output=csv";
    // קישור מפורש לגיליון OFFERS לפי GID: 2140417942
    const CSV_OFFERS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?gid=2140417942&single=true&output=csv";

    let allItems = [];

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function zoom(url) {
        document.getElementById('lb-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function renderOffers(offers) {
        const slider = document.getElementById('promo-slider');
        const grid = document.getElementById('promo-full');
        
        if (!offers.length) return;

        const html = offers.map(o => `
            <div class="card">
                <img src="https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${o.Barcode ? o.Barcode.trim() : 'default'}.jpg" 
                     onerror="this.src='https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/logo.png'" 
                     onclick="zoom(this.src)">
                <h3 style="font-size: 1rem; height: 2.5em; overflow: hidden;">${o.Discreption || 'מוצר במבצע'}</h3>
                <div class="price">₪${o.UnitPrice || '0'}</div>
                <div class="valid-tag">תוקף: ${o.Valid || 'עד גמר המלאי'}</div>
            </div>
        `).join('');

        if(slider) slider.innerHTML = html + html; 
        if(grid) grid.innerHTML = html;
    }

    function renderCatalog(data) {
        const container = document.getElementById('catalog-grid');
        container.innerHTML = data.map(i => `
            <div class="card">
                <img src="https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/products/${i.Barcode}.jpg" 
                     onerror="this.src='https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/logo.png'"
                     onclick="zoom(this.src)">
                <h3>${i.Name}</h3>
                <div class="price">₪${i.Price}</div>
            </div>
        `).join('');
    }

    function runFilter() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = allItems.filter(i => i.Name.toLowerCase().includes(term) || i.Barcode.includes(term));
        renderCatalog(filtered);
    }

    function start() {
        // טעינת מבצעים מקובץ OFFERS
        Papa.parse(CSV_OFFERS, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: res => {
                console.log("Offers loaded:", res.data);
                renderOffers(res.data.filter(o => o.Barcode));
            }
        });

        // טעינת קטלוג ראשי
        Papa.parse(CSV_MAIN, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: res => {
                allItems = res.data.filter(i => i.Barcode);
                renderCatalog(allItems);
            }
        });
    }

    window.onload = start;
</script>
</body>
</html>
