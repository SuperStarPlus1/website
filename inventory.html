<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ספירת מלאי — סיגריות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("YdRghsPrGyNUZnY7T");</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --accent: #f5a623;
    --accent2: #e8453c;
    --text: #f0f0f0;
    --muted: #8a8fa8;
    --border: #2e3350;
    --green: #2ecc71;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #1a1d27, #22263a);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.2rem; color: var(--accent); font-weight: 700; }
  .shift-badge {
    background: var(--accent);
    color: #000;
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.85rem;
  }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  /* ── Info Bar ── */
  .info-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .info-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .info-box label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 4px; }
  .info-box .val { font-size: 1rem; font-weight: bold; color: var(--accent); }

  /* ── Inputs ── */
  .field { margin-bottom: 14px; }
  .field label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  /* ── Scanner Section ── */
  .scan-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .scan-section h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; }

  .scan-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .scan-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    font-family: inherit;
  }
  .scan-row input:focus { border-color: var(--accent); }

  .btn-scan {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 16px;
    font-weight: bold;
    cursor: pointer;
    font-size: 1.1rem;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-scan:hover { opacity: 0.85; }

  #product-preview {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    display: none;
    border-right: 3px solid var(--accent);
  }
  #product-preview .prod-name { font-weight: bold; font-size: 1rem; color: var(--text); }
  #product-preview .prod-sub  { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
  #product-preview.not-found  { border-color: var(--accent2); }
  #product-preview.not-found .prod-name { color: var(--accent2); }

  .qty-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn-minus, .btn-plus {
    width: 44px; height: 44px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-minus:hover { background: var(--accent2); }
  .btn-plus:hover  { background: var(--accent); color: #000; }
  #qty-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    color: var(--text);
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    outline: none;
  }
  .btn-add {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* ── Camera Modal ── */
  #camera-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #camera-modal.open { display: flex; }
  #video { width: 100%; max-width: 400px; border-radius: 12px; border: 2px solid var(--accent); }
  .scan-line {
    position: absolute;
    width: 80%;
    max-width: 320px;
    height: 2px;
    background: var(--accent);
    animation: scanline 2s linear infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scanline {
    0%   { top: 30%; }
    50%  { top: 70%; }
    100% { top: 30%; }
  }
  .cam-btns { display: flex; gap: 12px; margin-top: 16px; }
  .btn-close-cam {
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-weight: bold;
    cursor: pointer;
    font-size: 1rem;
  }

  /* ── Items Table ── */
  .items-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .items-section h3 {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .items-section h3 span { color: var(--accent); font-size: 1rem; font-weight: bold; }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th {
    background: var(--surface);
    padding: 10px 12px;
    text-align: right;
    color: var(--muted);
    font-weight: 600;
    font-size: 0.78rem;
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .btn-del {
    background: none;
    border: none;
    color: var(--accent2);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

  /* ── Submit ── */
  .submit-section {
    display: flex;
    gap: 10px;
  }
  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #e8943a);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    padding: 12px 24px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 0.9rem;
    z-index: 9999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err { background: var(--accent2); color: white; }

  /* ── Loading ── */
  #loading {
    position: fixed;
    inset: 0;
    background: rgba(15,17,23,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 0.9rem; }
  #loading.hidden { display: none; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">טוען רשימת מוצרים...</p>
</div>

<!-- Camera Modal -->
<div id="camera-modal">
  <div style="position:relative; width:100%; max-width:400px; display:flex; justify-content:center;">
    <video id="video" autoplay muted playsinline webkit-playsinline></video>
  </div>
  <div class="cam-btns">
    <button class="btn-close-cam" onclick="stopCamera()">✕ סגור</button>
  </div>
  <p style="color:var(--muted);font-size:0.8rem;margin-top:10px;">כוון את הברקוד למרכז המסך</p>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Header -->
<header>
  <h1>🚬 ספירת מלאי סיגריות</h1>
  <div class="shift-badge" id="shift-badge">טוען...</div>
</header>

<div class="container">

  <!-- Info Bar -->
  <div class="info-bar">
    <div class="info-box" style="position:relative">
      <label>תאריך <button onclick="toggleDateEdit()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.7rem;padding:0 4px;" title="ערוך לסימולציה">✏️</button></label>
      <div class="val" id="disp-date">—</div>
      <input type="date" id="edit-date" style="display:none;width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:6px;color:var(--text);font-size:0.9rem;" onchange="applyDateEdit()">
    </div>
    <div class="info-box" style="position:relative">
      <label>שעה <button onclick="toggleTimeEdit()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.7rem;padding:0 4px;" title="ערוך לסימולציה">✏️</button></label>
      <div class="val" id="disp-time">—</div>
      <input type="time" id="edit-time" style="display:none;width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:6px;color:var(--text);font-size:0.9rem;" onchange="applyTimeEdit()">
    </div>
  </div>
  <div id="sim-badge" style="display:none;background:#3a1a2e;border:1px solid #e8453c;color:#e8453c;border-radius:8px;padding:6px 12px;font-size:0.78rem;text-align:center;margin-bottom:12px;">
    ⚠️ מצב סימולציה — תאריך/שעה ידניים
    <button onclick="resetDateTime()" style="background:none;border:none;color:#e8453c;cursor:pointer;font-weight:bold;margin-right:8px;">איפוס</button>
  </div>

  <!-- Worker Name -->
  <div class="field">
    <label>שם עובד</label>
    <input type="text" id="worker-name" placeholder="הכנס שם מלא..." autocomplete="name">
  </div>

  <!-- Scanner -->
  <div class="scan-section">
    <h3>📦 סריקת מוצר</h3>
    <div class="scan-row">
      <input type="text" id="barcode-input" placeholder="ברקוד, חלק מברקוד, או שם מוצר..."
        inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off"
        oninput="if(this.value.length >= 2) lookupBarcode()"
        onkeydown="if(event.key==='Enter') lookupBarcode()">
      <button class="btn-scan" onclick="openCamera()" title="סרוק עם מצלמה">📷</button>
      <button class="btn-scan" onclick="lookupBarcode()" style="background:#2e3350;color:var(--text);">חפש</button>
    </div>

    <div id="product-preview">
      <div class="prod-name" id="prod-name">—</div>
      <div class="prod-sub" id="prod-sub">—</div>
    </div>

    <!-- תוצאות חיפוש מרובות -->
    <div id="search-results" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;max-height:220px;overflow-y:auto;margin-bottom:10px;"></div>

    <div class="qty-row">
      <button class="btn-minus" onclick="changeQty(-1)">−</button>
      <input type="number" id="qty-input" value="1" min="1" max="9999">
      <button class="btn-plus" onclick="changeQty(1)">+</button>
      <button class="btn-add" onclick="addItem()">➕ הוסף</button>
    </div>
  </div>

  <!-- Items Table -->
  <div class="items-section">
    <h3>רשימת פריטים <span id="item-count">0</span></h3>
    <div id="items-container">
      <div class="empty-state"><div class="icon">📋</div>עוד לא סרקת פריטים</div>
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-section">
    <button class="btn-submit" id="btn-submit" onclick="submitCount()" disabled>
      📤 שלח ספירה
    </button>
    <button class="btn-clear" onclick="clearAll()">🗑 נקה</button>
  </div>

  <!-- כפתור השוואה -->
  <div style="margin-top:12px;">
    <button onclick="loadComparison()" style="width:100%;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:14px;font-size:0.9rem;cursor:pointer;transition:0.2s;"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
      📊 השוואה לספירה קודמת
    </button>
  </div>

  <!-- דוח השוואה -->
  <div id="comparison-section" style="display:none;margin-top:16px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-weight:bold;color:var(--accent);display:flex;justify-content:space-between;align-items:center;">
      <span id="comparison-title">השוואה לספירה קודמת</span>
      <button onclick="document.getElementById('comparison-section').style.display='none'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;">✕</button>
    </div>
    <div id="comparison-content" style="padding:10px;"></div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQkkYTwMe4n3ViI8N474bKHGGNwqa0GTMwskoWEEOrWJeA-BUrCcK95FZHNqcNqxhlF2INxL9GO70z/pub?output=csv";
const MANAGER_EMAILS = [
    "ashraf@superstar-plus.co.il",
    "criem@plusgold.co.il",
    "khalid@plusgold.co.il",
    "hatem@maxmarket.co.il"
];
const GAS_URL = "https://script.google.com/macros/s/AKfycbxNl-KTZCErJMdv6vgdLoez7--9bEogKNYU1i1OBKjhpS5TeyarrXTDjGnQyygslxs-0Q/exec";
const DEPT_FILTER = "סיגריות";



const SHIFTS = {
    morning: { label: "בוקר ☀️",  start: 6,  end: 14 },
    evening: { label: "ערב 🌆",   start: 14, end: 22 },
    night:   { label: "לילה 🌙",  start: 22, end: 6  },
};

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let products = [];       // כל מוצרי הסיגריות מהשיטס
let items = [];          // פריטים שנסרקו
let currentProduct = null;
let scanStream = null;
let scanInterval = null;

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
document.addEventListener('click', e => {
    const results = document.getElementById('search-results');
    const input   = document.getElementById('barcode-input');
    if (results && !results.contains(e.target) && e.target !== input) {
        results.style.display = 'none';
    }
});

window.onload = async () => {
    updateClock();
    setInterval(updateClock, 1000);
    await loadProducts();
};

// ── Date/Time override for simulation ──
let simDate = null; // override date (Date object)
let simTime = null; // override time string "HH:MM"

function getCurrentDateTime() {
    const base = simDate || new Date();
    const h = simTime ? parseInt(simTime.split(':')[0]) : base.getHours();
    const m = simTime ? parseInt(simTime.split(':')[1]) : base.getMinutes();
    return { date: base, h, m };
}

function updateClock() {
    const { date, h, m } = getCurrentDateTime();
    const s = new Date().getSeconds();
    const dateStr = date.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
    document.getElementById('disp-date').textContent = dateStr;
    document.getElementById('disp-time').textContent =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    let shift;
    if (h >= 6  && h < 14) shift = SHIFTS.morning;
    else if (h >= 14 && h < 22) shift = SHIFTS.evening;
    else shift = SHIFTS.night;
    document.getElementById('shift-badge').textContent = shift.label;
}

function toggleDateEdit() {
    const input = document.getElementById('edit-date');
    const disp  = document.getElementById('disp-date');
    input.style.display = input.style.display === 'none' ? 'block' : 'none';
    if (input.style.display === 'block' && !input.value) {
        const d = simDate || new Date();
        input.value = d.toISOString().split('T')[0];
    }
    disp.style.display = input.style.display === 'none' ? 'block' : 'none';
}

function applyDateEdit() {
    const val = document.getElementById('edit-date').value;
    if (!val) return;
    simDate = new Date(val);
    document.getElementById('edit-date').style.display = 'none';
    document.getElementById('disp-date').style.display = 'block';
    document.getElementById('sim-badge').style.display = 'block';
    updateClock();
}

function toggleTimeEdit() {
    const input = document.getElementById('edit-time');
    const disp  = document.getElementById('disp-time');
    input.style.display = input.style.display === 'none' ? 'block' : 'none';
    if (input.style.display === 'block' && !input.value) {
        const now = new Date();
        input.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    disp.style.display = input.style.display === 'none' ? 'block' : 'none';
}

function applyTimeEdit() {
    const val = document.getElementById('edit-time').value;
    if (!val) return;
    simTime = val;
    document.getElementById('edit-time').style.display = 'none';
    document.getElementById('disp-time').style.display = 'block';
    document.getElementById('sim-badge').style.display = 'block';
    updateClock();
}

function resetDateTime() {
    simDate = null; simTime = null;
    document.getElementById('sim-badge').style.display = 'none';
    document.getElementById('edit-date').value = '';
    document.getElementById('edit-time').value = '';
    updateClock();
}

async function loadProducts() {
    try {
        await new Promise((resolve, reject) => {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: r => {
                    const all = r.data.filter(x => x.Barcode && x.Barcode.trim());
                    products = all.filter(x =>
                        (x.Category || x.category || x['קטגוריה'] || '').trim() === DEPT_FILTER
                    );
                    console.log(`נטענו ${products.length} מוצרי סיגריות מתוך ${all.length}`);
                    resolve();
                },
                error: reject
            });
        });
        document.getElementById('loading').classList.add('hidden');
    } catch(e) {
        document.getElementById('loading-msg').textContent = 'שגיאה בטעינת מוצרים';
        console.error(e);
    }
}

// ════════════════════════════════════════════════════
//  BARCODE LOOKUP
// ════════════════════════════════════════════════════
function nb(b) {
    let s = String(b || '').trim();
    if (s.endsWith('.0')) s = s.slice(0, -2);
    return s;
}

function lookupBarcode(bc) {
    const input = (bc || document.getElementById('barcode-input').value).trim();
    if (!input) return;

    const term = input.toLowerCase();

    // חיפוש מדויק קודם
    const exact = products.find(p => nb(p.Barcode) === nb(input));
    if (exact) {
        selectProduct(exact);
        return;
    }

    // חיפוש חלקי — ברקוד מכיל OR שם מכיל
    const matches = products.filter(p => {
        const bc = nb(p.Barcode).toLowerCase();
        const nm = (p.Name || '').toLowerCase();
        return bc.includes(term) || nm.includes(term);
    });

    if (matches.length === 0) {
        currentProduct = null;
        const preview = document.getElementById('product-preview');
        preview.style.display = 'block';
        preview.className = 'not-found';
        document.getElementById('prod-name').textContent = '⚠️ מוצר לא נמצא';
        document.getElementById('prod-sub').textContent = `"${input}" — לא נמצא בקטלוג`;
        document.getElementById('search-results').style.display = 'none';
        return;
    }

    if (matches.length === 1) {
        selectProduct(matches[0]);
        return;
    }

    // תוצאות מרובות — הצג רשימה
    showSearchResults(matches, input);
}

function selectProduct(product) {
    currentProduct = product;
    document.getElementById('barcode-input').value = nb(product.Barcode);
    const preview = document.getElementById('product-preview');
    preview.style.display = 'block';
    preview.className = '';
    document.getElementById('prod-name').textContent = product.Name || 'מוצר';
    document.getElementById('prod-sub').textContent =
        `ברקוד: ${nb(product.Barcode)}  |  מחיר: ₪${product.Price || '—'}`;
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('qty-input').focus();
    document.getElementById('qty-input').select();
}

function showSearchResults(matches, term) {
    const container = document.getElementById('search-results');
    container.style.display = 'block';
    container.innerHTML =
        `<div style="padding:10px 14px;font-size:0.78rem;color:var(--muted);border-bottom:1px solid var(--border);">` +
        `נמצאו ${matches.length} תוצאות עבור "${term}"</div>` +
        matches.slice(0, 20).map(p => `
        <div onclick="selectProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})"
            style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;"
            onmouseenter="this.style.background='rgba(255,255,255,0.05)'"
            onmouseleave="this.style.background=''">
            <div style="font-weight:bold;font-size:0.9rem;">${p.Name || ''}</div>
            <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${nb(p.Barcode)}</div>
        </div>`).join('');
}

function changeQty(d) {
    const inp = document.getElementById('qty-input');
    inp.value = Math.max(1, (parseInt(inp.value) || 0) + d);
}

function addItem() {
    const barcode = document.getElementById('barcode-input').value.trim();
    const qty = parseInt(document.getElementById('qty-input').value) || 0;
    if (!barcode || qty <= 0) { showToast('הכנס ברקוד וכמות', true); return; }

    const existingIdx = items.findIndex(i => nb(i.barcode) === nb(barcode));
    if (existingIdx >= 0) {
        // ברקוד קיים — הצג התראה עם אפשרויות
        const ex = items[existingIdx];
        const choice = window.confirm(
            `⚠️ הברקוד ${barcode} כבר קיים!\n` +
            `מוצר: ${ex.name}\n` +
            `כמות קיימת: ${ex.qty}\n\n` +
            `לחץ אישור להוסיף ${qty} לכמות הקיימת (${ex.qty + qty} סה"כ)\n` +
            `לחץ ביטול לתיקון הכמות`
        );
        if (choice) {
            ex.qty += qty;
            showToast(`עודכן: ${ex.name} → ${ex.qty} יח'`);
        } else {
            // החזר את הברקוד לשדה לתיקון
            document.getElementById('qty-input').value = ex.qty;
            document.getElementById('qty-input').focus();
            document.getElementById('qty-input').select();
            return;
        }
    } else {
        const name = currentProduct
            ? (currentProduct.Name || currentProduct.Nm || 'לא ידוע')
            : '⚠️ לא נמצא';
        items.push({ barcode, name, qty, price: currentProduct ? (currentProduct.Price || '') : '' });
        showToast(`נוסף: ${name}`);
    }

    // Reset
    document.getElementById('barcode-input').value = '';
    document.getElementById('qty-input').value = '1';
    document.getElementById('product-preview').style.display = 'none';
    currentProduct = null;
    document.getElementById('barcode-input').focus();

    renderTable();
    document.getElementById('btn-submit').disabled = items.length === 0;
}

// ════════════════════════════════════════════════════
//  TABLE RENDER
// ════════════════════════════════════════════════════
function renderTable() {
    const container = document.getElementById('items-container');
    document.getElementById('item-count').textContent = items.length;

    if (!items.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📋</div>עוד לא סרקת פריטים</div>';
        return;
    }

    const total = items.reduce((s, i) => s + i.qty, 0);
    container.innerHTML = `
    <table>
      <thead><tr>
        <th>מוצר</th><th>ברקוד</th><th>כמות</th><th></th>
      </tr></thead>
      <tbody>
        ${items.map((i, idx) => `
        <tr>
          <td>${i.name}</td>
          <td style="font-size:0.75rem;color:var(--muted)">${i.barcode}</td>
          <td><strong style="color:var(--accent)">${i.qty}</strong></td>
          <td><button class="btn-del" onclick="deleteItem(${idx})">✕</button></td>
        </tr>`).join('')}
      </tbody>
      <tfoot><tr>
        <td colspan="2" style="color:var(--muted);font-size:0.8rem">סה"כ פריטים</td>
        <td><strong style="color:var(--green)">${total}</strong></td>
        <td></td>
      </tr></tfoot>
    </table>`;
}

function deleteItem(idx) {
    items.splice(idx, 1);
    renderTable();
    document.getElementById('btn-submit').disabled = items.length === 0;
}

// ════════════════════════════════════════════════════
//  CAMERA SCANNER — ZXing (עובד על כל דפדפן כולל iOS)
// ════════════════════════════════════════════════════
let zxingReader = null;

function loadScript(src) {
    return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

async function openCamera() {
    const modal = document.getElementById('camera-modal');
    modal.classList.add('open');
    try {
        await loadScript('https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js');

        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.CODE_128,
            ZXing.BarcodeFormat.UPC_A,
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        zxingReader = new ZXing.BrowserMultiFormatReader(hints);

        const video = document.getElementById('video');

        // בקש הרשאת מצלמה קודם (נדרש ב-iOS לקבלת רשימת מכשירים)
        try {
            const tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            tempStream.getTracks().forEach(t => t.stop());
        } catch(e) { /* ממשיך גם בלי זה */ }

        // קבל רשימת מצלמות דרך mediaDevices הסטנדרטי
        let backCamId = undefined;
        try {
            const allDevices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = allDevices.filter(d => d.kind === 'videoinput');
            const backCam = videoDevices.find(d => /back|rear|environment/i.test(d.label))
                || videoDevices[videoDevices.length - 1];
            if (backCam) backCamId = backCam.deviceId;
        } catch(e) { /* משתמש במצלמה ברירת מחדל */ }

        await zxingReader.decodeFromVideoDevice(
            backCamId,
            video,
            (result, err) => {
                if (result) {
                    const code = result.getText();
                    stopCamera();
                    document.getElementById('barcode-input').value = code;
                    lookupBarcode(code);
                }
            }
        );

        scanStream = video.srcObject;

    } catch(e) {
        console.error('Camera error:', e);
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
            showToast('אנא אפשר גישה למצלמה בהגדרות', true, 4000);
        } else if (e.name === 'NotFoundError') {
            showToast('לא נמצאה מצלמה במכשיר', true);
        } else {
            showToast('שגיאת מצלמה: ' + e.message, true, 4000);
        }
        modal.classList.remove('open');
        if (zxingReader) { zxingReader.reset(); zxingReader = null; }
    }
}

function stopCamera() {
    if (zxingReader) { zxingReader.reset(); zxingReader = null; }
    clearInterval(scanInterval); scanInterval = null;
    if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
    document.getElementById('camera-modal').classList.remove('open');
}

// ════════════════════════════════════════════════════
//  SUBMIT
// ════════════════════════════════════════════════════
async function submitCount() {
    const worker = document.getElementById('worker-name').value.trim();
    if (!worker) { showToast('נא להזין שם עובד', true); return; }
    if (!items.length) { showToast('אין פריטים לשליחה', true); return; }

    const { date, h, m } = getCurrentDateTime();
    const dateStr = date.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
    const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const shift = h >= 6 && h < 14 ? 'בוקר' : h >= 14 && h < 22 ? 'ערב' : 'לילה';
    const total = items.reduce((s, i) => s + i.qty, 0);

    document.getElementById('loading-msg').textContent = 'שולח ספירה...';
    document.getElementById('loading').classList.remove('hidden');

    try {
        // ── Build Excel ──
        const wb = XLSX.utils.book_new();
        const wsData = [
            ['ספירת מלאי סיגריות'],
            [`תאריך: ${dateStr}`, `שעה: ${timeStr}`, `משמרת: ${shift}`, `עובד: ${worker}`],
            [],
            ['ברקוד', 'שם מוצר', 'כמות'],
            ...items.map(i => [i.barcode, i.name, i.qty]),
            [],
            ['סה"כ יחידות:', '', total]
        ];
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = [{wch:18},{wch:35},{wch:10}];
        // עיצוב כותרת
        if (ws['A1']) ws['A1'].s = {font:{bold:true,sz:14}};
        if (ws['A4']) ws['A4'].s = {font:{bold:true},fill:{fgColor:{rgb:"0076DA"}},font:{color:{rgb:"FFFFFF"}}};
        XLSX.utils.book_append_sheet(wb, ws, 'ספירה');
        const excelBlob = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

        // ── Send to Google Apps Script ──
        const payload = {
            worker, date: dateStr, time: timeStr, shift,
            total, items,
            emails: MANAGER_EMAILS,
            subject: `ספירת מלאי סיגריות ${dateStr} ${timeStr} משמרת ${shift} - ${worker}`,
        };

        // ── שלח מייל עם EmailJS ──
        const tableRows = items.map(i =>
            `<tr><td style="padding:6px 10px;border-bottom:1px solid #eee">${i.name}</td>` +
            `<td style="padding:6px 10px;border-bottom:1px solid #eee;direction:ltr">${i.barcode}</td>` +
            `<td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:center"><strong>${i.qty}</strong></td></tr>`
        ).join('');

        const emailParams = {
            to_email:   MANAGER_EMAILS.join(","),
            subject:    `ספירת מלאי סיגריות ${dateStr} ${timeStr} משמרת ${shift} - ${worker}`,
            worker:     worker,
            date:       dateStr,
            time:       timeStr,
            shift:      shift,
            total:      total,
            items_html: `
                <table dir="rtl" style="border-collapse:collapse;width:100%;font-family:Arial">
                    <thead>
                        <tr style="background:#0f1117;color:white">
                            <th style="padding:8px 10px">מוצר</th>
                            <th style="padding:8px 10px">ברקוד</th>
                            <th style="padding:8px 10px">כמות</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                    <tfoot>
                        <tr style="background:#f5a623">
                            <td colspan="2" style="padding:8px 10px;font-weight:bold">סה"כ פריטים</td>
                            <td style="padding:8px 10px;font-weight:bold;text-align:center">${total}</td>
                        </tr>
                    </tfoot>
                </table>`,
        };

        // ── שלח לGoogle Apps Script (שמירה לשיטס + מייל עם קישור) ──
        try {
            const gasRes = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain' }
            });
            const gasData = await gasRes.json();
            if (gasData.status !== 'ok') console.warn('GAS warning:', gasData.message);
        } catch(e) {
            console.error('GAS error:', e);
            // fallback — שלח מייל דרך EmailJS
            await emailjs.send('service_o13n924', 'template_0wdkumm', emailParams);
        }



        document.getElementById('loading').classList.add('hidden');
        showToast('✅ הספירה נשלחה ונשמרה!');
        setTimeout(() => { if(confirm('לנקות את הרשימה לספירה חדשה?')) clearAll(); }, 2000);

    } catch(e) {
        console.error(e);
        document.getElementById('loading').classList.add('hidden');
        showToast('שגיאה בשליחה — נסה שוב', true);
    }
}

// ════════════════════════════════════════════════════
//  COMPARISON — השוואה לספירה קודמת
// ════════════════════════════════════════════════════
async function loadComparison() {
    if (!items.length) { showToast('אין פריטים לספירה הנוכחית', true); return; }

    const section = document.getElementById('comparison-section');
    const content = document.getElementById('comparison-content');
    const title   = document.getElementById('comparison-title');
    section.style.display = 'block';
    content.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">טוען נתונים...</div>';
    section.scrollIntoView({ behavior: 'smooth' });

    try {
        // קבע תאריך קודם
        const { date, h } = getCurrentDateTime();
        const shift = h >= 6 && h < 14 ? 'בוקר' : h >= 14 && h < 22 ? 'ערב' : 'לילה';
        const dateStr = date.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'-');

        // קבע משמרת קודמת
        const shiftOrder = ['בוקר', 'ערב', 'לילה'];
        const curIdx = shiftOrder.indexOf(shift);
        let prevShift, prevDateStr;
        if (curIdx === 0) {
            // בוקר → לילה של אתמול
            const yesterday = new Date(date); yesterday.setDate(yesterday.getDate() - 1);
            prevDateStr = yesterday.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'-');
            prevShift = 'לילה';
        } else {
            prevDateStr = dateStr;
            prevShift = shiftOrder[curIdx - 1];
        }

        const prevTab = `${prevDateStr}_${prevShift}`;
        title.textContent = `השוואה: ${shift} (נוכחי) vs ${prevShift} ${prevDateStr}`;

        // שלוף נתוני ספירה קודמת מ-GAS דרך JSONP (עוקף CORS)
        const data = await new Promise((resolve, reject) => {
            const cbName = 'gasCallback_' + Date.now();
            const script = document.createElement('script');
            window[cbName] = (d) => {
                delete window[cbName];
                document.head.removeChild(script);
                resolve(d);
            };
            script.onerror = () => reject(new Error('Failed to load GAS'));
            script.src = `${GAS_URL}?action=getSheet&tab=${encodeURIComponent(prevTab)}&callback=${cbName}`;
            document.head.appendChild(script);
            setTimeout(() => reject(new Error('Timeout')), 10000);
        });

        if (!data || data.status === 'error' || !data.rows || !data.rows.length) {
            content.innerHTML = `<div style="padding:16px;color:var(--muted);text-align:center;">לא נמצאה ספירת ${prevShift} מ-${prevDateStr}</div>`;
            return;
        }

        // בנה מפה: ברקוד → כמות קודמת
        const prevMap = {};
        data.rows.forEach(r => {
            const bc = String(r[1]||'').trim();
            const qty = parseInt(r[6]||0) || 0;
            if (bc) prevMap[bc] = (prevMap[bc] || 0) + qty;
        });

        // בנה טבלת השוואה
        const allBarcodes = new Set([
            ...items.map(i => i.barcode),
            ...Object.keys(prevMap)
        ]);

        let rows = '';
        allBarcodes.forEach(bc => {
            const cur  = items.find(i => i.barcode === bc);
            const curQty  = cur ? cur.qty : 0;
            const prevQty = prevMap[bc] || 0;
            const diff    = curQty - prevQty;
            const name    = cur ? cur.name : (prevMap[bc] ? `(${bc})` : bc);
            const diffColor = diff > 0 ? '#2ecc71' : diff < 0 ? '#e8453c' : '#8a8fa8';
            const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
            rows += `<tr>
                <td style="padding:8px;font-size:0.82rem;">${name}</td>
                <td style="padding:8px;text-align:center;color:#8a8fa8;">${prevQty || '—'}</td>
                <td style="padding:8px;text-align:center;color:var(--accent);font-weight:bold;">${curQty || '—'}</td>
                <td style="padding:8px;text-align:center;color:${diffColor};font-weight:bold;">${curQty && prevQty ? diffStr : '—'}</td>
            </tr>`;
        });

        content.innerHTML = `
        <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem;">
            <thead><tr style="background:var(--surface);">
                <th style="padding:10px;text-align:right;">מוצר</th>
                <th style="padding:10px;text-align:center;color:#8a8fa8;">${prevShift}<br><small>${prevDateStr}</small></th>
                <th style="padding:10px;text-align:center;color:var(--accent);">${shift}<br><small>נוכחי</small></th>
                <th style="padding:10px;text-align:center;">הפרש</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;

    } catch(e) {
        console.error(e);
        content.innerHTML = '<div style="padding:16px;color:var(--accent2);">שגיאה בטעינת נתונים</div>';
    }
}

function clearAll() {
    items = [];
    currentProduct = null;
    document.getElementById('barcode-input').value = '';
    document.getElementById('qty-input').value = '1';
    document.getElementById('product-preview').style.display = 'none';
    document.getElementById('worker-name').value = '';
    document.getElementById('btn-submit').disabled = true;
    renderTable();
}

// ════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, isErr = false, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isErr ? ' err' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, duration);
}
